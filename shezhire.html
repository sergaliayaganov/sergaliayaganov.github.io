```html id="final-shezhire-pro"
<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<title>Шежіре FINAL PRO</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f2f2f2;overflow:hidden;}
#toolbar{position:absolute;top:0;left:0;right:0;background:white;padding:10px;display:flex;gap:8px;}
#tree{width:100vw;height:100vh;}

.node rect{fill-opacity:0.35;stroke-width:2;}
.node text{font-size:14px;font-weight:bold;pointer-events:none;}
.link{fill:none;stroke:#999;stroke-width:2;}

#modal{
position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
background:white;padding:20px;border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.3);
display:none;width:300px;
}
.childItem{background:#eee;margin:5px;padding:5px;border-radius:5px;}
</style>
</head>

<body>

<div id="toolbar">
<button id="addChildBtn">➕ Бала қосу</button>
<button id="renameBtn">✏️ Өзгерту</button>
<button id="saveBtn">💾 Сақтау</button>
</div>

<svg id="tree"></svg>

<div id="modal">
<h3>Бірнеше бала қосу</h3>

<input id="childName" placeholder="Аты">
<select id="gender">
<option value="male">ер</option>
<option value="female">әйел</option>
</select>
<select id="type">
<option value="бала">бала</option>
<option value="жиен">жиен</option>
</select>

<br><br>
<button id="addMore">+ Қосу</button>
<button id="confirm">Дайын</button>
<button id="close">Жабу</button>

<div id="list"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// 🔥 Firebase
const firebaseConfig = {
  apiKey: "AIzaSyB9oEdAGpIaPtNZjFvsfIAKVFKOzrIdvE4",
  authDomain: "shezhire-site.firebaseapp.com",
  databaseURL: "https://shezhire-site-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId: "shezhire-site",
  storageBucket: "shezhire-site.firebasestorage.app",
  messagingSenderId: "714823841418",
  appId: "1:714823841418:web:99333d2aba6d57857b1f73",
  measurementId: "G-8V6NR3MHYC"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

let data=null, selected=null;

// 🔥 авто root
onValue(ref(db,"tree"),snap=>{
if(snap.exists()){
data=snap.val();
}else{
data={
name:"АЛАШ",
gender:"male",
type:"бала",
children:[
{name:"Сейілхан",gender:"male",type:"бала",children:[]},
{name:"Жайлыхан",gender:"male",type:"бала",children:[]}
]};
set(ref(db,"tree"),data);
}
update();
});

function toggle(d){
if(d.children){d._children=d.children;d.children=null;}
else{d.children=d._children;d._children=null;}
}

const svg=d3.select("#tree");
const g=svg.append("g");

svg.call(d3.zoom().on("zoom",e=>g.attr("transform",e.transform)));

function update(){

g.selectAll("*").remove();
if(!data) return;

const root=d3.hierarchy(data,d=>d.children);
d3.tree().nodeSize([80,220])(root);

// 🔥 ЕҢ ҰЗЫН ЕСІМ
let maxLen=0;
root.descendants().forEach(d=>{
if(d.data.name.length>maxLen) maxLen=d.data.name.length;
});

const charW=9;
const padding=40;
const nodeWidth=Math.max(120,maxLen*charW+padding);

const nodeHeight=40;
const radius=nodeHeight/2;

// 🔗 link
g.selectAll(".link")
.data(root.links())
.enter().append("path")
.attr("class","link")
.attr("stroke",d=>d.target.data.type==="жиен"?"gold":"#999")
.attr("stroke-width",d=>d.target.data.type==="жиен"?4:2)
.attr("d",d=>{

const p=d.source;
const c=d.target;

const sx=p.y+nodeWidth/2;
const sy=p.x;

const ex=c.y-nodeWidth/2;
const ey=c.x;

const mx=(sx+ex)/2;

return `M${sx},${sy} C${mx},${sy} ${mx},${ey} ${ex},${ey}`;
});

// 👤 node
const node=g.selectAll(".node")
.data(root.descendants())
.enter().append("g")
.attr("transform",d=>`translate(${d.y},${d.x})`)
.on("click",(e,d)=>{
selected=d;
toggle(d.data);
update();
});

node.each(function(d){

const group=d3.select(this);

group.append("rect")
.attr("x",-nodeWidth/2)
.attr("y",-nodeHeight/2)
.attr("width",nodeWidth)
.attr("height",nodeHeight)
.attr("rx",radius)
.attr("ry",radius)
.attr("fill",d.data.gender==="female"?"#f7a6c6":"#8bb7ff")
.attr("stroke",d.data.type==="жиен"?"gold":(d.data.gender==="female"?"#d95380":"#3b70d6"))
.attr("stroke-width",d.data.type==="жиен"?4:2);

group.append("text")
.attr("text-anchor","middle")
.attr("dy",5)
.text(d.data.name);

});
}

// --- MULTI ADD ---
const modal=document.getElementById("modal");
const list=document.getElementById("list");

let temp=[];

document.getElementById("addChildBtn").onclick=()=>{
if(!selected){alert("Адам таңда");return;}
modal.style.display="block";
temp=[]; list.innerHTML="";
};

document.getElementById("addMore").onclick=()=>{
const name=document.getElementById("childName").value;
if(!name) return;

const gender=document.getElementById("gender").value;
const type=document.getElementById("type").value;

temp.push({name,gender,type});

const div=document.createElement("div");
div.className="childItem";
div.textContent=name;
list.appendChild(div);

document.getElementById("childName").value="";
};

document.getElementById("confirm").onclick=()=>{
temp.forEach(c=>{
if(!selected.data.children) selected.data.children=[];
selected.data.children.push({...c,children:[]});
});
modal.style.display="none";
update();
};

document.getElementById("close").onclick=()=>modal.style.display="none";

// ✏️ rename
document.getElementById("renameBtn").onclick=()=>{
if(!selected){alert("Таңда");return;}
const n=prompt("Жаңа аты:",selected.data.name);
if(n) selected.data.name=n;
update();
};

// 💾 save
document.getElementById("saveBtn").onclick=()=>{
set(ref(db,"tree"),data);
alert("Сақталды");
};

</script>
</body>
</html>
```
