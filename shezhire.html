<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<title>Шежіре PRO</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f2f2f2;overflow:hidden;}
#toolbar{position:absolute;top:0;left:0;right:0;background:white;padding:10px;display:flex;gap:8px;}
#tree{width:100vw;height:100vh;}

.node rect{
stroke-width:2;
fill-opacity:0.35;
rx:25;
ry:25;
cursor:pointer;
}

.node text{
font-size:14px;
font-weight:bold;
fill:#222;
pointer-events:none;
}

.link{
fill:none;
stroke:#999;
stroke-width:2;
}
</style>
</head>

<body>

<div id="toolbar">
<button id="btnAddChild">➕ Бала</button>
<button id="btnSave">💾 Сақтау</button>
</div>

<svg id="tree"></svg>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app = initializeApp({
  apiKey:"AIzaSy...",
  databaseURL:"https://shezhire-site-default-rtdb.europe-west1.firebasedatabase.app/"
});
const db=getDatabase(app);

let data=null, selected=null;

onValue(ref(db,"tree"),snap=>{
if(snap.exists()){
data=snap.val();
}else{
data={
name:"АЛАШ",
gender:"male",
type:"бала",
children:[
{name:"Сейілхан",gender:"male",type:"бала",children:[]},
{name:"Жайлыхан",gender:"male",type:"бала",children:[]}
]};
set(ref(db,"tree"),data);
}
update();
});

function toggle(d){
if(d.children){d._children=d.children;d.children=null;}
else{d.children=d._children;d._children=null;}
}

const svg=d3.select("#tree");
const g=svg.append("g");

svg.call(d3.zoom().on("zoom",e=>g.attr("transform",e.transform)));

function update(){

g.selectAll("*").remove();
if(!data) return;

const root=d3.hierarchy(data,d=>d.children);
const tree=d3.tree().nodeSize([80,220]);
tree(root);

// 📏 өлшемдер
const rectH=40;
const pad=14;

// 🔗 LINKS (қисық сызық)
g.selectAll(".link")
.data(root.links())
.enter()
.append("path")
.attr("class","link")
.attr("stroke",d=>d.target.data.type==="жиен"?"gold":"#999")
.attr("stroke-width",d=>d.target.data.type==="жиен"?4:2)
.attr("d",d=>{

const p=d.source;
const c=d.target;

const pw=Math.max(80,p.data.name.length*9);
const cw=Math.max(80,c.data.name.length*9);

// 👉 әкенің оң жақ центрі
const startX=p.y + pw/2;
const startY=p.x;

// 👉 баланың сол жақ шеті
const endX=c.y - cw/2;
const endY=c.x;

// 👉 қисық
const midX=(startX+endX)/2;

return `M${startX},${startY}
C${midX},${startY}
 ${midX},${endY}
 ${endX},${endY}`;
});

// 👤 NODE
const node=g.selectAll(".node")
.data(root.descendants())
.enter()
.append("g")
.attr("transform",d=>`translate(${d.y},${d.x})`)
.on("click",(e,d)=>{
selected=d;
toggle(d.data);
update();
});

node.each(function(d){

const group=d3.select(this);

const w=Math.max(80,d.data.name.length*9);

group.append("rect")
.attr("x",-w/2)
.attr("y",-rectH/2)
.attr("width",w)
.attr("height",rectH)
.attr("rx",25)
.attr("ry",25)
.attr("fill",d.data.gender==="female"?"#f7a6c6":"#8bb7ff")
.attr("stroke",d.data.type==="жиен"?"gold":(d.data.gender==="female"?"#d95380":"#3b70d6"))
.attr("stroke-width",d.data.type==="жиен"?4:2);

group.append("text")
.attr("text-anchor","middle")
.attr("dy",5)
.text(d.data.name);

});

}

// ➕ бала қосу (жылдам)
document.getElementById("btnAddChild").onclick=()=>{
if(!selected){alert("Адам таңда");return;}
const name=prompt("Аты:");
if(!name) return;

const gender=prompt("ер/әйел","ер")==="әйел"?"female":"male";
const type=prompt("бала/жиен","бала");

if(!selected.data.children) selected.data.children=[];
selected.data.children.push({
name,gender,type,children:[]
});

update();
};

document.getElementById("btnSave").onclick=()=>{
set(ref(db,"tree"),data);
alert("Сақталды");
};

</script>
</body>
</html>
