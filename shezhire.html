<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8" />
<title>Шежіре FINAL PRO</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f2f2f2;
  overflow: hidden;
}
#toolbar {
  position: absolute;
  top: 0; left: 0; right: 0;
  background: white;
  padding: 10px;
  display: flex;
  gap: 8px;
}
#tree {
  width: 100vw;
  height: 100vh;
}

.node rect {
  fill-opacity: 0.35;
  stroke-width: 2;
}
.node text {
  font-size: 14px;
  font-weight: bold;
  pointer-events: none;
}
.link {
  fill: none;
  stroke: #999;
  stroke-width: 2;
}

#modal {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  display: none;
  width: 300px;
}
.childItem {
  background: #eee;
  margin: 5px 0;
  padding: 5px 10px;
  border-radius: 5px;
}
</style>
</head>

<body>

<div id="toolbar">
  <button id="addChildBtn">➕ Бала қосу</button>
  <button id="renameBtn">✏️ Өзгерту</button>
  <button id="deleteBtn">🗑 Жою</button>
  <button id="saveBtn">💾 Сақтау</button>
</div>

<svg id="tree"></svg>

<div id="modal">
  <h3>Бірнеше бала қосу</h3>

  <input id="childName" placeholder="Аты" />
  <select id="gender">
    <option value="male">ер</option>
    <option value="female">әйел</option>
  </select>
  <select id="type">
    <option value="бала">бала</option>
    <option value="жиен">жиен</option>
  </select>

  <br /><br />
  <button id="addMore">+ Қосу</button>
  <button id="confirm">Дайын</button>
  <button id="close">Жабу</button>

  <div id="list"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB9oEdAGpIaPtNZjFvsfIAKVFKOzrIdvE4",
  authDomain: "shezhire-site.firebaseapp.com",
  databaseURL: "https://shezhire-site-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId: "shezhire-site",
  storageBucket: "shezhire-site.firebasestorage.app",
  messagingSenderId: "714823841418",
  appId: "1:714823841418:web:99333d2aba6d57857b1f73"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let data = null;
let selected = null;
let root = null;

const svg = d3.select("#tree");
const g = svg.append("g");

svg.call(d3.zoom().on("zoom", e => g.attr("transform", e.transform)));

onValue(ref(db, "tree"), snap => {
  if (snap.exists()) {
    data = snap.val();
  } else {
    data = {
      name: "АЛАШ",
      gender: "male",
      type: "бала",
      children: [
        { name: "Сейілхан", gender: "male", type: "бала", children: [] },
        { name: "Жайлыхан", gender: "male", type: "бала", children: [] }
      ]
    };
    set(ref(db, "tree"), data);
  }
  root = d3.hierarchy(data, d => d.children);
  selected = root;
  update();
});

function toggle(d) {
  if (d.children) {
    d._children = d.children;
    d.children = null;
  } else if (d._children) {
    d.children = d._children;
    d._children = null;
  }
}

function update() {
  g.selectAll("*").remove();
  if (!data) return;

  let maxLen = 0;
  d3.hierarchy(data).descendants().forEach(d => {
    if (d.data.name.length > maxLen) maxLen = d.data.name.length;
  });

  const nodeWidth = Math.max(120, maxLen * 9 + 40);
  const nodeHeight = 40;

  root = d3.hierarchy(data, d => d.children);
  d3.tree().nodeSize([80, nodeWidth + 120])(root);

  if (selected) {
    let found = null;
    root.each(d => {
      if (d.data === selected.data) found = d;
    });
    selected = found || root;
  }

  g.selectAll(".link")
    .data(root.links())
    .enter()
    .append("path")
    .attr("class", "link")
    .attr("stroke", d => (d.target.data.type === "жиен" ? "gold" : "#999"))
    .attr("stroke-width", d => (d.target.data.type === "жиен" ? 4 : 2))
    .attr("d", d => {
      const sx = d.source.y + nodeWidth/2;
      const sy = d.source.x;
      const ex = d.target.y - nodeWidth/2;
      const ey = d.target.x;
      const mx = (sx + ex) / 2;
      return `M${sx},${sy} C${mx},${sy} ${mx},${ey} ${ex},${ey}`;
    });

  const nodes = g.selectAll(".node")
    .data(root.descendants())
    .enter()
    .append("g")
    .attr("transform", d => `translate(${d.y},${d.x})`)
    .on("click", (e,d)=>{
      selected = d;
      toggle(d.data);
      update();
    });

  nodes.append("rect")
    .attr("x", -nodeWidth/2)
    .attr("y", -20)
    .attr("width", nodeWidth)
    .attr("height", 40)
    .attr("rx", 20)
    .attr("fill", d => d.data.gender==="female"?"#f7a6c6":"#8bb7ff");

  nodes.append("text")
    .attr("text-anchor","middle")
    .attr("dy",5)
    .text(d=>d.data.name);
}

/* ================= DELETE ================= */
document.getElementById("deleteBtn").onclick = () => {
  if (!selected) {
    alert("Түйінді таңдаңыз");
    return;
  }

  if (selected === root) {
    alert("Түпкі адамды өшіруге болмайды");
    return;
  }

  if (!confirm("Шынымен өшіресіз бе?")) return;

  function removeNode(parent, target) {
    if (!parent.children) return false;

    const index = parent.children.findIndex(c => c === target.data);
    if (index !== -1) {
      parent.children.splice(index, 1);
      return true;
    }

    return parent.children.some(child => removeNode(child, target));
  }

  removeNode(data, selected);
  selected = root;
  update();
};
/* ========================================== */

document.getElementById("renameBtn").onclick = () => {
  const newName = prompt("Жаңа аты:", selected.data.name);
  if (newName) {
    selected.data.name = newName;
    update();
  }
};

document.getElementById("saveBtn").onclick = () => {
  set(ref(db, "tree"), data);
  alert("Сақталды");
};
</script>
</body>
</html>
