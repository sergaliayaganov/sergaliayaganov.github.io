<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8" />
<title>Шежіре</title>

<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
body { margin:0; font-family:Arial; background:#f2f2f2; overflow:hidden;}
#toolbar { position:absolute; top:0; left:0; right:0; background:white; padding:10px; display:flex; gap:8px;}
#tree { width:100vw; height:100vh;}

.node rect { fill-opacity:0.35; stroke-width:2;}
.node text { font-size:14px; font-weight:bold; pointer-events:none;}
.link { fill:none; stroke:#999; stroke-width:2;}

#modal {
  position:fixed; top:50%; left:50%;
  transform:translate(-50%,-50%);
  background:white; padding:20px; border-radius:10px;
  box-shadow:0 4px 15px rgba(0,0,0,0.3);
  display:none; width:300px;
}
.childItem { background:#eee; margin:5px 0; padding:5px 10px; border-radius:5px;}
</style>
</head>

<body>

<div id="toolbar">
  <button id="addChildBtn">➕ Бала қосу</button>
  <button id="renameBtn">✏️ Өзгерту</button>
  <button id="saveBtn">💾 Сақтау</button>
</div>

<svg id="tree"></svg>

<div id="modal">
  <h3>Бала қосу</h3>
  <input id="childName" placeholder="Аты" />
  <select id="gender">
    <option value="male">ер</option>
    <option value="female">әйел</option>
  </select>
  <select id="type">
    <option value="бала">бала</option>
    <option value="жиен">жиен</option>
  </select>
  <br><br>
  <button id="addMore">+ Қосу</button>
  <button id="confirm">Дайын</button>
  <button id="close">Жабу</button>
  <div id="list"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "shezhire-site.firebaseapp.com",
  databaseURL: "https://shezhire-site-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId: "shezhire-site",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let data = null;
let selected = null;
let root = null;

const svg = d3.select("#tree");
const g = svg.append("g");

svg.call(d3.zoom().on("zoom", e => g.attr("transform", e.transform)));

onValue(ref(db, "tree"), snap => {
  data = snap.exists() ? snap.val() : {
    name:"АЛАШ", gender:"male", type:"бала", children:[]
  };
  root = d3.hierarchy(data);
  selected = root;
  update();
});

function toggle(d){
  if(d.children){ d._children=d.children; d.children=null; }
  else if(d._children){ d.children=d._children; d._children=null; }
}

function update(){
  g.selectAll("*").remove();
  if(!data) return;

  root = d3.hierarchy(data);
  d3.tree().nodeSize([80,200])(root);

  // ✅ СЫЗЫҚ ТҮЗЕТІЛДІ
  g.selectAll(".link")
    .data(root.links())
    .enter().append("path")
    .attr("class","link")
    .attr("d", d => {
      const nodeWidth = 120;

      const sx = d.source.y + nodeWidth / 2;
      const sy = d.source.x;

      const ex = d.target.y - nodeWidth / 2;
      const ey = d.target.x;

      const mx = (sx + ex) / 2;

      return `M${sx},${sy} C${mx},${sy} ${mx},${ey} ${ex},${ey}`;
    });

  const nodes = g.selectAll(".node")
    .data(root.descendants())
    .enter().append("g")
    .attr("class","node")
    .attr("transform",d=>`translate(${d.y},${d.x})`)
    .on("click",(e,d)=>{selected=d; toggle(d); update();});

  nodes.append("rect")
    .attr("x",-60).attr("y",-20)
    .attr("width",120).attr("height",40)
    .attr("rx",20)
    .attr("fill",d=>d.data.gender==="female"?"#f7a6c6":"#8bb7ff");

  nodes.append("text")
    .attr("text-anchor","middle")
    .attr("dy",5)
    .text(d=>d.data.name);
}

// ================= UI =================

// ✅ БАРЛЫҚ ЭЛЕМЕНТТЕРДІ ДҰРЫС АЛУ
const addChildBtn = document.getElementById("addChildBtn");
const renameBtn = document.getElementById("renameBtn");
const saveBtn = document.getElementById("saveBtn");

const addMore = document.getElementById("addMore");
const confirm = document.getElementById("confirm");
const closeBtn = document.getElementById("close");

const childName = document.getElementById("childName");
const modal = document.getElementById("modal");
const list = document.getElementById("list");

let tempChildren=[];

// ➕ Бала қосу
addChildBtn.onclick=()=>{
  if(!selected) return alert("Таңда");
  modal.style.display="block";
  tempChildren=[]; list.innerHTML="";
};

// + қосу
addMore.onclick=()=>{
  const name=childName.value.trim();
  if(!name) return alert("Аты керек");

  const gender=document.getElementById("gender").value;
  const type=document.getElementById("type").value;

  tempChildren.push({name,gender,type});

  const div=document.createElement("div");
  div.className="childItem";
  div.textContent=name;
  list.appendChild(div);

  childName.value="";
};

// сақтау (модал)
confirm.onclick=()=>{
  tempChildren.forEach(c=>{
    if(!selected.data.children) selected.data.children=[];
    selected.data.children.push({...c,children:[]});
  });
  modal.style.display="none";
  update();
};

// жабу
closeBtn.onclick=()=>modal.style.display="none";

// ✏️ өзгерту
renameBtn.onclick=()=>{
  if(!selected) return;
  const n=prompt("Жаңа аты",selected.data.name);
  if(n) {selected.data.name=n; update();}
};

// 💾 сақтау
saveBtn.onclick=()=>{
  set(ref(db,"tree"), data);
  alert("Сақталды ✅");
};

</script>
</body>
</html>
