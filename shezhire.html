<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8" />
<title>Шежіре FINAL PRO+</title>

<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
body { margin:0; font-family:Arial; background:#f2f2f2; overflow:hidden; }
#toolbar { position:absolute; top:0; left:0; right:0; background:white; padding:10px; display:flex; gap:8px; }
#tree { width:100vw; height:100vh; }

.node rect { fill-opacity:0.35; stroke-width:2; }
.node text { font-size:14px; font-weight:bold; pointer-events:none; }
.link { fill:none; stroke:#999; stroke-width:2; }

#modal {
  position:fixed; top:50%; left:50%;
  transform:translate(-50%, -50%);
  background:white; padding:20px;
  border-radius:10px; display:none;
}
.childItem { background:#eee; margin:5px; padding:5px; border-radius:5px; }
</style>
</head>

<body>

<div id="toolbar">
  <button id="addChildBtn">➕ Бала қосу</button>
  <button id="renameBtn">✏️ Өзгерту</button>
  <button id="deleteBtn">🗑 Жою</button>
</div>

<svg id="tree"></svg>

<div id="modal">
  <h3>Бала қосу</h3>
  <input id="childName" placeholder="Аты" />
  <select id="gender">
    <option value="male">ер</option>
    <option value="female">әйел</option>
  </select>
  <select id="type">
    <option value="бала">бала</option>
    <option value="жиен">жиен</option>
  </select>
  <br><br>
  <button id="addMore">+ Қосу</button>
  <button id="confirm">Дайын</button>
  <button id="close">Жабу</button>
  <div id="list"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIza...",
  authDomain: "shezhire-site.firebaseapp.com",
  databaseURL: "https://shezhire-site-default-rtdb.europe-west1.firebasedatabase.app/",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let data = null;
let selected = null;
let root = null;

const svg = d3.select("#tree");
const g = svg.append("g");

svg.call(d3.zoom().on("zoom", e => g.attr("transform", e.transform)));

function autoSave() {
  set(ref(db, "tree"), data);
}

// 🔄 Firebase тыңдау
onValue(ref(db, "tree"), snap => {
  if (snap.exists()) {
    data = snap.val();
  } else {
    data = {
      name: "АЛАШ",
      gender: "male",
      type: "бала",
      children: []
    };
    autoSave();
  }
  root = d3.hierarchy(data);
  selected = root;
  update();
});

function toggle(d){
  if(d.children){ d._children=d.children; d.children=null; }
  else if(d._children){ d.children=d._children; d._children=null; }
}

function update(){
  g.selectAll("*").remove();
  if(!data) return;

  root = d3.hierarchy(data, d=>d.children);
  d3.tree().nodeSize([80,200])(root);

  const nodes = g.selectAll(".node")
    .data(root.descendants())
    .enter().append("g")
    .attr("transform", d=>`translate(${d.y},${d.x})`)
    .on("click",(e,d)=>{ selected=d; toggle(d.data); update(); });

  nodes.append("rect")
    .attr("x",-60).attr("y",-20)
    .attr("width",120).attr("height",40)
    .attr("rx",20)
    .attr("fill",d=>d.data.gender==="female"?"#f7a6c6":"#8bb7ff");

  nodes.append("text")
    .attr("text-anchor","middle")
    .attr("dy",5)
    .text(d=>d.data.name);

  g.selectAll(".link")
    .data(root.links())
    .enter().append("path")
    .attr("class","link")
    .attr("d",d=>`M${d.source.y},${d.source.x}L${d.target.y},${d.target.x}`);

  // 👉 Батырма аты
  const btn = document.getElementById("addChildBtn");
  btn.textContent = selected ? `➕ Бала қосу (${selected.data.name})` : "➕ Бала қосу";
}

// ➕ Бала қосу
let temp=[];
const modal=document.getElementById("modal");
const list=document.getElementById("list");

addChildBtn.onclick=()=>{
  if(!selected) return alert("Таңда");
  modal.style.display="block";
  temp=[]; list.innerHTML="";
};

addMore.onclick=()=>{
  const name=childName.value.trim();
  if(!name) return alert("Аты керек");

  temp.push({
    name,
    gender:gender.value,
    type:type.value,
    children:[]
  });

  const div=document.createElement("div");
  div.className="childItem";
  div.textContent=name;
  list.appendChild(div);

  childName.value="";
};

confirm.onclick=()=>{
  temp.forEach(c=>{
    if(!selected.data.children) selected.data.children=[];
    selected.data.children.push(c);
  });
  modal.style.display="none";
  autoSave(); // 🔥 авто сақтау
  update();
};

close.onclick=()=>modal.style.display="none";

// ✏️ rename
renameBtn.onclick=()=>{
  const n=prompt("Жаңа аты:",selected.data.name);
  if(n){
    selected.data.name=n;
    autoSave(); // 🔥 авто сақтау
    update();
  }
};

// 🗑 delete
deleteBtn.onclick=()=>{
  if(selected===root) return alert("Root жойылмайды");

  function remove(parent,target){
    if(!parent.children) return false;
    const i=parent.children.indexOf(target);
    if(i>-1){ parent.children.splice(i,1); return true; }
    return parent.children.some(c=>remove(c,target));
  }

  remove(data,selected.data);
  selected=root;
  autoSave(); // 🔥 авто сақтау
  update();
};
</script>

</body>
</html>
