<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8" />
<title>Шежіреге өзгерістер енгізу</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
body { margin:0; font-family: Arial; background:#f2f2f2; overflow:hidden; }
#toolbar { position:absolute; top:0; left:0; right:0; background:white; padding:10px; display:flex; gap:8px; align-items:center; }
#tree { width:100vw; height:100vh; }
.node rect { fill-opacity:0.35; stroke-width:2; }
.node text { font-size:14px; font-weight:bold; pointer-events:none; }
.link { fill:none; stroke:#999; stroke-width:2; }
#modal { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:20px; border-radius:10px; box-shadow:0 4px 15px rgba(0,0,0,0.3); display:none; width:300px; }
.childItem { background:#eee; margin:5px 0; padding:5px 10px; border-radius:5px; }
#saveMessage { color:green; font-weight:bold; display:none; margin-left:10px; }
</style>
</head>

<body>

<div id="toolbar">
  <button id="addChildBtn">➕ Бала қосу</button>
  <button id="renameBtn">✏️ Өзгерту</button>
  <button id="saveBtn">💾 Сақтау</button>
  <span id="saveMessage">Сақталды ✅</span>
</div>

<svg id="tree"></svg>

<div id="modal">
  <h3>Бірнеше бала қосу</h3>
  <input id="childName" placeholder="Аты" />
  <select id="gender">
    <option value="male">ер</option>
    <option value="female">әйел</option>
  </select>
  <select id="type">
    <option value="бала">бала</option>
    <option value="жиен">жиен</option>
  </select>
  <br /><br />
  <button id="addMore">+ Қосу</button>
  <button id="confirm">Дайын</button>
  <button id="close">Жабу</button>
  <div id="list"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// Firebase конфиг
const firebaseConfig = {
  apiKey: "AIzaSyB9oEdAGpIaPtNZjFvsfIAKVFKOzrIdvE4",
  authDomain: "shezhire-site.firebaseapp.com",
  databaseURL: "https://shezhire-site-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId: "shezhire-site",
  storageBucket: "shezhire-site.firebasestorage.app",
  messagingSenderId: "714823841418",
  appId: "1:714823841418:web:99333d2aba6d57857b1f73"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let data = null;
let selected = null;
let root = null;

const svg = d3.select("#tree");
const g = svg.append("g");
svg.call(d3.zoom().on("zoom", e => g.attr("transform", e.transform)));

// 🔄 Деректерді жүктеу
onValue(ref(db,"tree"), snap => {
  if(snap.exists()){
    data = snap.val();
  } else {
    data = {
      name:"АЛАШ",
      gender:"male",
      type:"бала",
      children:[
        { name:"Сейілхан", gender:"male", type:"бала", children:[] },
        { name:"Жайлыхан", gender:"male", type:"бала", children:[] }
      ]
    };
    set(ref(db,"tree"), data);
  }
  root = d3.hierarchy(data, d=>d.children);
  selected = root;
  update();
});

// toggle
function toggle(d){
  if(d.children){ d._children=d.children; d.children=null; }
  else if(d._children){ d.children=d._children; d._children=null; }
}

// update tree
function update(){
  g.selectAll("*").remove();
  if(!data) return;

  const treeLayout = d3.tree().nodeSize([80, 200]);
  root = d3.hierarchy(data, d=>d.children);
  treeLayout(root);

  // links
  g.selectAll(".link")
    .data(root.links())
    .enter()
    .append("path")
    .attr("class","link")
    .attr("d", d => `M${d.source.y},${d.source.x} C${(d.source.y+d.target.y)/2},${d.source.x} ${(d.source.y+d.target.y)/2},${d.target.x} ${d.target.y},${d.target.x}`);

  // nodes
  const nodes = g.selectAll(".node")
    .data(root.descendants())
    .enter()
    .append("g")
    .attr("transform", d => `translate(${d.y},${d.x})`)
    .on("click",(e,d)=>{ selected=d; toggle(d.data); update(); });

  nodes.append("circle")
    .attr("r",20)
    .attr("fill", d => d.data.gender==="female"?"pink":"lightblue");

  nodes.append("text")
    .attr("dy",5)
    .attr("text-anchor","middle")
    .text(d=>d.data.name);
}

// ➕ бала қосу
let tempChildren = [];

document.getElementById("addChildBtn").onclick = () => {
  if(!selected) return alert("Адам таңдаңыз");
  modal.style.display="block";
  tempChildren=[];
  list.innerHTML="";
};

document.getElementById("addMore").onclick = () => {
  const name = childName.value.trim();
  if(!name) return alert("Аты керек");

  tempChildren.push({
    name,
    gender:gender.value,
    type:type.value
  });

  const div=document.createElement("div");
  div.textContent=name;
  list.appendChild(div);

  childName.value="";
};

document.getElementById("confirm").onclick = () => {
  if(!selected.data.children) selected.data.children=[];
  tempChildren.forEach(c=>{
    selected.data.children.push({...c, children:[]});
  });
  modal.style.display="none";
  update();
};

document.getElementById("renameBtn").onclick = () => {
  if(!selected) return;
  const n = prompt("Жаңа аты:", selected.data.name);
  if(n){ selected.data.name=n; update(); }
};

// 💾 САҚТАУ (FIXED)
document.getElementById("saveBtn").onclick = () => {

  if(!data){
    alert("Дерек жоқ!");
    return;
  }

  const cleanData = JSON.parse(JSON.stringify(data));

  set(ref(db,"tree"), cleanData)
    .then(() => {
      const msg = document.getElementById("saveMessage");
      msg.style.display = "inline";
      setTimeout(()=>msg.style.display="none",2000);
    })
    .catch(err => alert("Қате: "+err.message));
};

</script>
</body>
</html>
