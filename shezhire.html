<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8" />
<title>Шежіре 2</title>

<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
body { margin:0; font-family:Arial; background:#f2f2f2; overflow:hidden;}
#toolbar {position:absolute; top:0; left:0; right:0; background:white; padding:10px; display:flex; gap:8px;}
#tree {width:100vw; height:100vh;}
.node rect {fill-opacity:0.35; stroke-width:2;}
.node text {font-size:14px; font-weight:bold; pointer-events:none;}
.link {fill:none; stroke:#999; stroke-width:2;}
.selected rect {stroke:red; stroke-width:3;}
#modal {position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
background:white; padding:20px; border-radius:10px; display:none;}
</style>
</head>

<body>

<div id="toolbar">
  <button id="addChildBtn">➕ Бала қосу</button>
  <button id="renameBtn">✏️ Өзгерту</button>
  <button id="saveBtn">💾 Сақтау</button>
</div>

<svg id="tree"></svg>

<div id="modal">
  <input id="childName" placeholder="Аты" />
  <select id="gender">
    <option value="male">ер</option>
    <option value="female">әйел</option>
  </select>
  <br><br>
  <button id="addMore">+ Қосу</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// 🔥 СЕНІҢ CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyB9oEdAGpIaPtNZjFvsfIAKVFKOzrIdvE4",
  authDomain: "shezhire-site.firebaseapp.com",
  databaseURL: "https://shezhire-site-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId: "shezhire-site",
  storageBucket: "shezhire-site.firebasestorage.app",
  messagingSenderId: "714823841418",
  appId: "1:714823841418:web:99333d2aba6d57857b1f73",
  measurementId: "G-8V6NR3MHYC"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let data = null;
let selected = null;

const svg = d3.select("#tree");
const g = svg.append("g");

svg.call(d3.zoom().on("zoom", e => g.attr("transform", e.transform)));

onValue(ref(db, "tree"), snap => {
  if (snap.exists()) {
    data = snap.val();
  } else {
    data = { name:"АЛАШ", gender:"male", children:[] };
    set(ref(db, "tree"), data);
  }
  update();
});

function update() {
  g.selectAll("*").remove();
  if (!data) return;

  const nodeWidth = 120;

  const root = d3.hierarchy(data);
  d3.tree().nodeSize([80,200])(root);

  // ✅ СЫЗЫҚ FIX
  g.selectAll(".link")
    .data(root.links())
    .enter()
    .append("path")
    .attr("class","link")
    .attr("d", d => {
      const sx = d.source.y + nodeWidth/2;
      const sy = d.source.x;

      const ex = d.target.y - nodeWidth/2;
      const ey = d.target.x;

      const mx = (sx + ex) / 2;

      return `M${sx},${sy} C${mx},${sy} ${mx},${ey} ${ex},${ey}`;
    });

  const node = g.selectAll(".node")
    .data(root.descendants())
    .enter()
    .append("g")
    .attr("class","node")
    .attr("transform", d=>`translate(${d.y},${d.x})`)
    .on("click",(e,d)=>{
      selected = d;
      update();
    });

  // highlight
  node.classed("selected", d => d === selected);

  node.append("rect")
    .attr("x",-60).attr("y",-20)
    .attr("width",120).attr("height",40)
    .attr("rx",20)
    .attr("fill", d=>d.data.gender==="female"?"#f7a6c6":"#8bb7ff");

  node.append("text")
    .attr("text-anchor","middle")
    .attr("dy",5)
    .text(d=>d.data.name);
}

// 🔥 CLEAN (Firebase fix)
function cleanData(node){
  return {
    name: node.name,
    gender: node.gender,
    children: node.children ? node.children.map(cleanData) : []
  };
}

// ➕ Бала қосу
document.getElementById("addChildBtn").onclick = () => {
  if (!selected) return alert("Адам таңдаңыз");

  const name = prompt("Бала аты:");
  if (!name) return;

  if (!selected.data.children) selected.data.children = [];

  selected.data.children.push({
    name,
    gender:"male",
    children:[]
  });

  update();
};

// ✏️ Өзгерту
document.getElementById("renameBtn").onclick = () => {
  if (!selected) return alert("Таңда");

  const name = prompt("Жаңа аты:", selected.data.name);
  if (name) {
    selected.data.name = name;
    update();
  }
};

// 💾 САҚТАУ
document.getElementById("saveBtn").onclick = async () => {
  try{
    const clean = cleanData(data);
    await set(ref(db,"tree"), clean);
    alert("Сақталды");
  }catch(e){
    alert("Қате: "+e.message);
    console.error(e);
  }
};
</script>

</body>
</html>
