<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8" />
<title>Шежіре 3</title>

<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
body { margin:0; font-family:Arial; background:#f2f2f2; overflow:hidden;}
#toolbar {position:absolute; top:0; left:0; right:0; background:white; padding:10px; display:flex; gap:8px;}
#tree {width:100vw; height:100vh;}
.node rect {fill-opacity:0.35; stroke-width:2;}
.node text {font-size:14px; font-weight:bold; pointer-events:none;}
.link {fill:none; stroke:#999; stroke-width:2;}
.selected rect {stroke:red; stroke-width:3;}

#modal {
 position:fixed; top:50%; left:50%;
 transform:translate(-50%,-50%);
 background:white; padding:20px;
 border-radius:10px; display:none;
}
.childItem {background:#eee; margin:5px; padding:5px;}
</style>
</head>

<body>

<div id="toolbar">
  <button id="addChildBtn">➕ Бала қосу</button>
  <button id="renameBtn">✏️ Өзгерту</button>
  <button id="saveBtn">💾 Сақтау</button>
</div>

<svg id="tree"></svg>

<div id="modal">
  <input id="childName" placeholder="Аты" />
  <select id="gender">
    <option value="male">ер</option>
    <option value="female">әйел</option>
  </select>
  <select id="type">
    <option value="бала">бала</option>
    <option value="жиен">жиен</option>
  </select>
  <br><br>
  <button id="addMore">+ Қосу</button>
  <button id="confirm">Дайын</button>
  <div id="list"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB9oEdAGpIaPtNZjFvsfIAKVFKOzrIdvE4",
  authDomain: "shezhire-site.firebaseapp.com",
  databaseURL: "https://shezhire-site-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId: "shezhire-site",
  storageBucket: "shezhire-site.firebasestorage.app",
  messagingSenderId: "714823841418",
  appId: "1:714823841418:web:99333d2aba6d57857b1f73"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let data = null;
let selected = null;
let tempChildren = [];

const svg = d3.select("#tree");
const g = svg.append("g");

svg.call(d3.zoom().on("zoom", e => g.attr("transform", e.transform)));

onValue(ref(db, "tree"), snap => {
  data = snap.exists() ? snap.val() : {
    name:"АЛАШ",
    gender:"male",
    type:"бала",
    children:[]
  };
  update();
});

// collapse
function toggle(d){
  if(d.children){
    d._children = d.children;
    d.children = null;
  } else {
    d.children = d._children;
    d._children = null;
  }
}

function update(){
  g.selectAll("*").remove();
  if(!data) return;

  const nodeWidth = 140;

  const root = d3.hierarchy(data);
  d3.tree().nodeSize([80,220])(root);

  // links
  g.selectAll(".link")
    .data(root.links())
    .enter()
    .append("path")
    .attr("class","link")
    .attr("stroke", d=>d.target.data.type==="жиен"?"gold":"#999")
    .attr("stroke-width", d=>d.target.data.type==="жиен"?4:2)
    .attr("d", d=>{
      const sx=d.source.y+nodeWidth/2;
      const sy=d.source.x;
      const ex=d.target.y-nodeWidth/2;
      const ey=d.target.x;
      const mx=(sx+ex)/2;
      return `M${sx},${sy} C${mx},${sy} ${mx},${ey} ${ex},${ey}`;
    });

  const node = g.selectAll(".node")
    .data(root.descendants())
    .enter()
    .append("g")
    .attr("class","node")
    .attr("transform", d=>`translate(${d.y},${d.x})`)
    .on("click",(e,d)=>{
      selected=d;
      toggle(d.data);
      update();
    });

  node.classed("selected", d=>d===selected);

  node.append("rect")
    .attr("x",-70).attr("y",-20)
    .attr("width",140).attr("height",40)
    .attr("rx",20)
    .attr("fill", d=>d.data.gender==="female"?"#f7a6c6":"#8bb7ff");

  node.append("text")
    .attr("text-anchor","middle")
    .attr("dy",5)
    .text(d=>d.data.name);
}

// CLEAN
function cleanData(node){
  return {
    name: node.name || "",
    gender: node.gender || "male",
    type: node.type || "бала",
    children: node.children ? node.children.map(cleanData) : []
  };
}

// --- MODAL ---
const modal = document.getElementById("modal");
const list = document.getElementById("list");

document.getElementById("addChildBtn").onclick = ()=>{
  if(!selected) return alert("Адам таңдаңыз");
  modal.style.display="block";
  tempChildren=[];
  list.innerHTML="";
};

document.getElementById("addMore").onclick = ()=>{
  const name = childName.value.trim();
  if(!name) return alert("Аты керек");

  const gender = document.getElementById("gender").value;
  const type = document.getElementById("type").value;

  tempChildren.push({name, gender, type});

  const div=document.createElement("div");
  div.className="childItem";
  div.textContent=`${name} (${gender}, ${type})`;
  list.appendChild(div);

  childName.value="";
};

document.getElementById("confirm").onclick = ()=>{
  if(tempChildren.length===0) return;

  tempChildren.forEach(c=>{
    if(!selected.data.children) selected.data.children=[];
    selected.data.children.push({...c, children:[]});
  });

  modal.style.display="none";
  update();
};

// rename
document.getElementById("renameBtn").onclick = ()=>{
  if(!selected) return alert("Таңда");
  const name=prompt("Жаңа аты:", selected.data.name);
  if(name) selected.data.name=name;
  update();
};

// SAVE
document.getElementById("saveBtn").onclick = async ()=>{
  try{
    const clean=cleanData(data);
    await set(ref(db,"tree"), clean);
    alert("Сақталды");
  }catch(e){
    alert("Қате: "+e.message);
    console.error(e);
  }
};
</script>

</body>
</html>
