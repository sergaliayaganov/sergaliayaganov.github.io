<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8" />
<title>Шежіреге қосу</title>

<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
body { margin:0; font-family:Arial; background:#f2f2f2; overflow:hidden;}
#toolbar { position:absolute; top:0; left:0; right:0; background:white; padding:10px; display:flex; gap:8px;}
#tree { width:100vw; height:100vh;}

.node rect { fill-opacity:0.35; stroke-width:2;}
.node text { font-size:14px; font-weight:bold; pointer-events:none;}
.link { fill:none; stroke:#999; stroke-width:2;}

#modal {
  position:fixed; top:50%; left:50%;
  transform:translate(-50%,-50%);
  background:white; padding:20px; border-radius:10px;
  box-shadow:0 4px 15px rgba(0,0,0,0.3);
  display:none; width:300px;
}
.childItem { background:#eee; margin:5px 0; padding:5px 10px; border-radius:5px;}
</style>
</head>

<body>

<div id="toolbar">
  <button id="addChildBtn">➕ Бала қосу</button>
  <button id="renameBtn">✏️ Өзгерту</button>
  <button id="saveBtn">💾 Сақтау</button>
</div>

<svg id="tree"></svg>

<div id="modal">
  <h3>Бала қосу</h3>
  <input id="childName" placeholder="Аты" />
  <select id="gender">
    <option value="male">ер</option>
    <option value="female">әйел</option>
  </select>
  <select id="type">
    <option value="бала">бала</option>
    <option value="жиен">жиен</option>
  </select>
  <br><br>
  <button id="addMore">+ Қосу</button>
  <button id="confirm">Дайын</button>
  <button id="close">Жабу</button>
  <div id="list"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// Firebase конфиг
const firebaseConfig = {
  apiKey: "AIzaSyB9oEdAGpIaPtNZjFvsfIAKVFKOzrIdvE4",
  authDomain: "shezhire-site.firebaseapp.com",
  databaseURL: "https://shezhire-site-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId: "shezhire-site",
  storageBucket: "shezhire-site.firebasestorage.app",
  messagingSenderId: "714823841418",
  appId: "1:714823841418:web:99333d2aba6d57857b1f73",
  measurementId: "G-8V6NR3MHYC"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let data = null;
let selected = null;
let root = null;

const svg = d3.select("#tree");
const g = svg.append("g");

svg.call(d3.zoom().on("zoom", e => g.attr("transform", e.transform)));

// Деректерді жүктеу
onValue(ref(db, "tree"), snap => {
  data = snap.exists() ? snap.val() : { name:"АЛАШ", gender:"male", type:"бала", children:[] };
  root = d3.hierarchy(data);
  selected = root;
  update();
});

function toggle(d){
  if(d.children){ d._children=d.children; d.children=null; }
  else if(d._children){ d.children=d._children; d._children=null; }
}

function update(){
  g.selectAll("*").remove();
  if(!data) return;

  root = d3.hierarchy(data);
  const treeLayout = d3.tree().nodeSize([80,200]);
  treeLayout(root);

  // Линктер сызу
  g.selectAll(".link")
    .data(root.links())
    .enter()
    .append("path")
    .attr("class","link")
    .attr("d", d => {
      const sx = d.source.y + (d.source.rectWidth || 60);
      const sy = d.source.x;
      const ex = d.target.y - (d.target.rectWidth || 60);
      const ey = d.target.x;
      const mx = (sx + ex) / 2;
      return `M${sx},${sy} C${mx},${sy} ${mx},${ey} ${ex},${ey}`;
    });

  // Түйіндер сызу
  const nodes = g.selectAll(".node")
    .data(root.descendants())
    .enter()
    .append("g")
    .attr("class","node")
    .attr("transform", d=>`translate(${d.y},${d.x})`)
    .on("click",(e,d)=>{ selected=d; toggle(d); update(); });

  nodes.each(function(d){
    const group = d3.select(this);
    // динамикалық ені
    const w = Math.max(120, d.data.name.length*9 + 20);
    d.rectWidth = w;

    group.append("rect")
      .attr("x", -w/2)
      .attr("y", -20)
      .attr("width", w)
      .attr("height", 40)
      .attr("rx", 20)
      .attr("fill", d.data.gender==="female"?"#f7a6c6":"#8bb7ff")
      .attr("stroke", d.data.type==="жиен"?"gold":"#3b70d6")
      .attr("stroke-width", d.data.type==="жиен"?4:2);

    group.append("text")
      .attr("text-anchor","middle")
      .attr("dy",5)
      .text(d.data.name);
  });
}

// UI
let tempChildren=[];
const modal=document.getElementById("modal");
const list=document.getElementById("list");

addChildBtn.onclick=()=>{
  if(!selected) return alert("Таңда");
  modal.style.display="block";
  tempChildren=[]; list.innerHTML="";
};

addMore.onclick=()=>{
  const name=childName.value.trim();
  if(!name) return alert("Аты керек");
  const gender=document.getElementById("gender").value;
  const type=document.getElementById("type").value;

  tempChildren.push({name,gender,type});

  const div=document.createElement("div");
  div.className="childItem";
  div.textContent=name;
  list.appendChild(div);

  childName.value="";
};

confirm.onclick=()=>{
  tempChildren.forEach(c=>{
    if(!selected.data.children) selected.data.children=[];
    selected.data.children.push({...c,children:[]});
  });
  modal.style.display="none";
  update();
};

close.onclick=()=>modal.style.display="none";

renameBtn.onclick=()=>{
  if(!selected) return;
  const n=prompt("Жаңа аты",selected.data.name);
  if(n) {selected.data.name=n; update();}
};

saveBtn.onclick=()=>{
  set(ref(db,"tree"), data);
  alert("Сақталды ✅");
};
</script>
</body>
</html>
