<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<title>Шежіре визуалды (Firebase)</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";

<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f2f2f2;}
#toolbar{padding:10px;background:white;border-bottom:1px solid #ccc;display:flex;gap:8px;}
#tree{width:100vw;height:90vh;}
.node rect{rx:20;ry:20;cursor:pointer;}
.link{fill:none;stroke:#999;}
</style>
</head>

<body>

<div id="toolbar">
<button id="btnCreateRoot">👤 Бірінші адам</button>
<button id="btnAddChild">➕ Бала</button>
<button id="btnRename">✏️ Өзгерту</button>
<button id="btnDelete">❌ Өшіру</button>
<button id="btnSave">💾 Сақтау</button>
</div>

<svg id="tree"></svg>

<!-- MODAL -->
<div id="modal" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;padding:20px;border-radius:10px;">
<input id="name" placeholder="Аты"><br><br>
<select id="gender">
<option value="male">ер</option>
<option value="female">әйел</option>
</select><br><br>
<button id="ok">OK</button>
</div>

<script type="module">
const db = window.db;
const ref = window.ref;
const set = window.set;
const onValue = window.onValue;

let data = null;
let selected = null;
let mode = "";

const svg = d3.select("#tree");
const g = svg.append("g");

svg.call(d3.zoom().on("zoom", e => g.attr("transform", e.transform)));

function draw(){
  g.selectAll("*").remove();
  if(!data) return;

  const root = d3.hierarchy(data);
  d3.tree().nodeSize([70,220])(root);

  // links
  g.selectAll(".link")
    .data(root.links())
    .enter().append("path")
    .attr("class","link")
    .attr("d", d3.linkHorizontal()
      .x(d=>d.y)
      .y(d=>d.x));

  // nodes
  const node = g.selectAll(".node")
    .data(root.descendants())
    .enter().append("g")
    .attr("transform",d=>`translate(${d.y},${d.x})`)
    .on("click",(e,d)=>selected=d.data);

  node.append("rect")
    .attr("width",120)
    .attr("height",40)
    .attr("x",-60)
    .attr("y",-20)
    .attr("fill",d=>d.data.gender==="female"?"#f7a6c6":"#8bb7ff");

  node.append("text")
    .attr("text-anchor","middle")
    .attr("dy",5)
    .text(d=>d.data.name);
}

// 🔹 Firebase оқу
onValue(ref(db,"tree"), snap=>{
  data = snap.val();
  draw();
});

// UI
const modal = document.getElementById("modal");
const nameInput = document.getElementById("name");
const genderInput = document.getElementById("gender");

// 👤 root
btnCreateRoot.onclick = ()=>{
  mode="root";
  modal.style.display="block";
};

// ➕ бала
btnAddChild.onclick = ()=>{
  if(!selected){alert("Адам таңда!");return;}
  mode="child";
  modal.style.display="block";
};

// ✏️ rename
btnRename.onclick = ()=>{
  if(!selected){alert("Таңда!");return;}
  mode="rename";
  nameInput.value=selected.name;
  modal.style.display="block";
};

// ❌ delete
btnDelete.onclick = ()=>{
  if(!selected){alert("Таңда!");return;}

  function remove(node,parent){
    if(node===selected){
      if(parent){
        parent.children = parent.children.filter(c=>c!==node);
      }
      return true;
    }
    if(node.children){
      for(let c of node.children){
        if(remove(c,node)) return true;
      }
    }
  }

  if(data===selected){
    data=null;
  }else{
    remove(data,null);
  }

  draw();
};

// 💾 save
btnSave.onclick = ()=>{
  set(ref(db,"tree"),data);
  alert("Сақталды!");
};

// modal OK
ok.onclick = ()=>{
  const name=nameInput.value;
  const gender=genderInput.value;

  if(mode==="root"){
    data={name,gender,children:[]};
  }

  if(mode==="child"){
    if(!selected.children) selected.children=[];
    selected.children.push({name,gender,children:[]});
  }

  if(mode==="rename"){
    selected.name=name;
  }

  modal.style.display="none";
  nameInput.value="";
  draw();
};
</script>

</body>
</html>
