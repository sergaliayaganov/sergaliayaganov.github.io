<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<title>Шежіре визуалды (Firebase)</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f2f2f2;overflow:hidden;}
#toolbar{position:absolute;top:0;left:0;right:0;background:white;padding:10px;border-bottom:1px solid #ccc;z-index:10;display:flex;gap:8px;}
#tree{width:100vw;height:100vh;}
.node rect{stroke-width:2;fill-opacity:0.3;rx:20;ry:20;cursor:pointer;}
.node text{font-size:14px;pointer-events:none;font-weight:bold;fill:#222;}
.link{fill:none;stroke:#999;stroke-width:2;}
#addChildModal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;padding:20px 30px;box-shadow:0 4px 15px rgba(0,0,0,0.3);border-radius:10px;z-index:100;display:none;width:320px;}
#addChildModal label{display:block;margin-top:12px;font-weight:600;}
#addChildModal select,#addChildModal input{width:100%;margin-top:6px;padding:6px 8px;font-size:14px;box-sizing:border-box;}
#addChildModal .buttons{margin-top:18px;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;}
#addChildModal button{padding:6px 14px;font-size:14px;cursor:pointer;border:none;border-radius:5px;}
#addChildModal button.confirm{background-color:#4CAF50;color:white;flex:1;}
#addChildModal button.addMore{background-color:#2196F3;color:white;flex:1;}
#addChildModal button.cancel{background-color:#ccc;flex:1;}
#childList{margin-top:12px;max-height:120px;overflow-y:auto;border:1px solid #ddd;padding:6px;border-radius:5px;}
#childList .childItem{background:#eee;padding:6px 8px;margin-bottom:6px;border-radius:4px;font-size:13px;color:#444;}
</style>
</head>
<body>

<div id="toolbar">
<button id="btnCreateRoot">👤 Бірінші адам қосу</button>
<button id="btnAddChild">➕ Бала қосу</button>
<button id="btnRename">✏️ Өзгерту</button>
<button id="btnDelete">❌ Өшіру</button>
<button id="btnSave">💾 Сақтау</button>
</div>

<svg id="tree"></svg>

<div id="addChildModal">
<h3>Бала қосу</h3>
<form id="addChildForm">
<label for="parentSelect">Ата-ана:</label>
<select id="parentSelect" required></select>
<label for="childName">Аты:</label>
<input type="text" id="childName" required minlength="1"/>
<label for="childGender">Жынысы:</label>
<select id="childGender" required>
<option value="male">ер</option>
<option value="female">әйел</option>
</select>
<label for="childType">Типі:</label>
<select id="childType" required>
<option value="бала">бала</option>
<option value="жиен">жиен</option>
</select>
<div class="buttons">
<button type="submit" class="confirm">Қосу</button>
<button type="button" class="addMore" id="btnAddMoreChild">+ Тағы қосу</button>
<button type="button" class="cancel" id="cancelAddChild">Жабу</button>
</div>
</form>
<div id="childList"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";

const firebaseConfig = {
  apiKey: "AIzaSyB9oEdAGpIaPtNZjFvsfIAKVFKOzrIdvE4",
  authDomain: "shezhire-site.firebaseapp.com",
  databaseURL: "https://shezhire-site-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId: "shezhire-site",
  storageBucket: "shezhire-site.firebasestorage.app",
  messagingSenderId: "714823841418",
  appId: "1:714823841418:web:99333d2aba6d57857b1f73",
  measurementId: "G-8V6NR3MHYC"
};

const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const db = getDatabase(app);

let data = null;
let selected = null;

onValue(ref(db,"tree"), snap=>{
  if(snap.exists()){ data=snap.val(); collapseAll(data); } else data=null;
  selected=null; update();
});

function collapseAll(node){ if(node.children){ node._children=node.children; node._children.forEach(collapseAll); node.children=null; } }
function toggle(d){ if(d.children){ d._children=d.children; d.children=null; } else if(d._children){ d.children=d._children; d._children=null; } }

const svg = d3.select("#tree").attr("width",window.innerWidth).attr("height",window.innerHeight);
const g = svg.append("g");
svg.call(d3.zoom().on("zoom",(event)=>g.attr("transform",event.transform)));
g.attr("transform","translate(200,200)");

function update(){
  g.selectAll("*").remove();
  if(!data) return;
  const root=d3.hierarchy(data,d=>d.children);

  // 🔥 ең ұзын атты табу
  let maxNameLength = 0;
  root.descendants().forEach(d => {
      if(d.data.name.length > maxNameLength){
          maxNameLength = d.data.name.length;
      }
  });

  const rectPaddingX = 14, rectHeight = 40, rx = 20;
  const maxTextWidth = Math.max(50,maxNameLength*10);

  // 🔥 Динамикалық горизонталь арақашықтық (арқылы ұзын есімдер)
  const dynamicWidth = Math.max(220, maxTextWidth + 100);

  // 🌳 Layout
  const treeLayout = d3.tree().nodeSize([60, dynamicWidth]);
  treeLayout(root);
  if(!selected) selected=root;

  g.selectAll(".link").data(root.links()).enter().append("path").attr("class","link")
    .attr("stroke",d=>d.target.data.type==="жиен"?"gold":"#999")
    .attr("stroke-width",d=>d.target.data.type==="жиен"?4:2)
    .attr("fill","none")
    .attr("d",d=>{
      const parent=d.source, child=d.target;
      const parentRectWidth = Math.max(maxTextWidth,parent.data.name.length*10+rectPaddingX*2);
      const childRectWidth  = Math.max(maxTextWidth,child.data.name.length*10+rectPaddingX*2);
      const startX = parent.y + parentRectWidth/2;
      const startY = parent.x;
      const endX   = child.y - childRectWidth/2;
      const endY   = child.x;
      const midX = (startX+endX)/2;
      return `M${startX},${startY} C${midX},${startY} ${midX},${endY} ${endX},${endY}`;
    });

  const node=g.selectAll(".node").data(root.descendants()).enter().append("g")
    .attr("class","node")
    .attr("transform",d=>`translate(${d.y},${d.x})`)
    .on("click",(event,d)=>{ toggle(d.data); update(); selected=d; });

  node.each(function(d){
    const group=d3.select(this);
    const rectWidth=Math.max(maxTextWidth,d.data.name.length*10+rectPaddingX*2);
    group.append("rect").attr("x",-rectWidth/2).attr("y",-rectHeight/2).attr("width",rectWidth)
      .attr("height",rectHeight).attr("rx",rx).attr("ry",rx)
      .attr("fill",d.data.gender==="female"?"#f7a6c6":"#8bb7ff")
      .attr("stroke-width", d.data.type==="жиен"?4:2)
      .attr("stroke", d.data.type==="жиен"?"gold":(d.data.gender==="female"?"#d95380":"#3b70d6"));
    group.append("text").attr("text-anchor","middle").attr("dy",5).text(d.data.name);
  });
}

// --- Modal & Controls ---
const modal=document.getElementById("addChildModal");
const form=document.getElementById("addChildForm");
const parentSelect=document.getElementById("parentSelect");
const childNameInput=document.getElementById("childName");
const childGenderSelect=document.getElementById("childGender");
const childTypeSelect=document.getElementById("childType");
const childList=document.getElementById("childList");
const btnCreateRoot=document.getElementById("btnCreateRoot");
const btnAddChild=document.getElementById("btnAddChild");
const btnRename=document.getElementById("btnRename");
const btnDelete=document.getElementById("btnDelete");
const btnSave=document.getElementById("btnSave");
const btnCancelAddChild=document.getElementById("cancelAddChild");
const btnAddMoreChild=document.getElementById("btnAddMoreChild");

let addedChildren=[];

btnCreateRoot.onclick=()=>{
if(data){ alert("Бірінші адам бар!"); return; }
const name=prompt("Аты:"); if(!name) return;
const gender=prompt("Жынысы (ер/әйел):","ер")==="әйел"?"female":"male";
data={name,gender,type:"бала",children:[]}; selected=null; update();
};

btnAddChild.onclick=()=>{
if(!data){ alert("Алдымен бірінші адам қосыңыз"); return; }
if(!selected){ alert("Ата-ананы таңдаңыз"); return; }
form.reset(); childList.innerHTML=""; addedChildren=[];
const nodes=[]; function collectNodes(node){nodes.push(node); if(node.children) node.children.forEach(collectNodes);} collectNodes(data);
parentSelect.innerHTML=""; nodes.forEach(n=>{const option=document.createElement("option");option.value=n.name;option.textContent=n.name;parentSelect.appendChild(option);});
if(selected) parentSelect.value = selected.data.name;
modal.style.display="block"; childNameInput.focus();
};

btnCancelAddChild.onclick=()=>{modal.style.display="none";addedChildren=[];childList.innerHTML="";};

function addChildToList(){ const name=childNameInput.value.trim(); if(!name){ alert("Аты жазылуы тиіс"); return; } const gender=childGenderSelect.value; const type=childTypeSelect.value; const parentName=parentSelect.value;
addedChildren.push({name,gender,type,parentName});
const div=document.createElement("div"); div.className="childItem"; div.textContent=`${parentName} → ${name} (${gender==="male"?"ер":"әйел"}, ${type})`; childList.appendChild(div);
childNameInput.value=""; childNameInput.focus(); }

form.querySelector(".confirm").onclick=e=>{ e.preventDefault(); if(childNameInput.value.trim()!=="") addChildToList(); if(addedChildren.length===0){ alert("Кем дегенде бір бала қосыңыз"); return; } insertChildren(); };
btnAddMoreChild.onclick=e=>{ e.preventDefault(); if(childNameInput.value.trim()===""){ alert("Аты жазылуы тиіс"); return; } addChildToList(); };

function insertChildren(){ if(addedChildren.length===0){ alert("Кем дегенде бір бала қосыңыз"); return; } addedChildren.forEach(child=>{
function findNodeByName(node,name){ if(node.name===name) return node; if(!node.children) return null; for(let c of node.children){ const found=findNodeByName(c,name); if(found) return found; } return null; }
const parentNode=findNodeByName(data,child.parentName); if(!parentNode){ alert(`Ата-ана табылмады: ${child.parentName}`); return; }
if(!parentNode.children) parentNode.children=[]; parentNode.children.push({name:child.name,gender:child.gender,type:child.type,children:[]});
}); modal.style.display="none"; addedChildren=[]; childList.innerHTML=""; update(); }

btnRename.onclick=()=>{ if(!selected){ alert("Түйінді таңдаңыз"); return; } const newName=prompt("Аты:",selected.data.name); if(newName && newName.trim().length>0){ selected.data.name=newName.trim(); update(); }};
btnDelete.onclick=()=>{ if(!selected){ alert("Түйінді таңдаңыз"); return; } if(selected.data===data){ if(confirm("Барлық шежіре жойылсын ба?")){ data=null; selected=null; update(); } return; } function remove(parent,node){ if(!parent.children) return; parent.children=parent.children.filter(c=>c!==node.data); parent.children.forEach(c=>remove(c,node)); } remove(data,selected); selected=null; update(); };
btnSave.onclick=()=>{ if(!data){ alert("Сақтауға ештеңе жоқ"); return; } set(ref(db,"tree"),data); alert("Сақталды!"); };

window.addEventListener("resize",()=>{ svg.attr("width",window.innerWidth).attr("height",window.innerHeight); update(); });

</script>
</body>
</html>
