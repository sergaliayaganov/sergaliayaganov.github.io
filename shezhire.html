<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<title>Шежіре визуалды</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
body{margin:0;font-family:Arial;background:#f2f2f2;overflow:hidden;}
#toolbar{
  position:absolute;top:0;left:0;right:0;background:white;padding:10px;border-bottom:1px solid #ccc;z-index:10;
}
#tree{width:100vw;height:100vh;}
.node circle{stroke-width:2;}
.node text{font-size:14px;pointer-events:none;}
.link{fill:none;stroke:#999;stroke-width:2;}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);align-items:center;justify-content:center;z-index:20;}
.modalBox{background:white;padding:20px;border-radius:10px;width:320px;max-height:80vh;overflow:auto;}
input,select{width:100%;margin-bottom:8px;padding:5px;}
</style>
</head>
<body>

<div id="toolbar">
  <button onclick="addChild()">Бала қосу</button>
  <button onclick="renameNode()">Атын өзгерту</button>
  <button onclick="deleteNode()">Өшіру</button>
  <button onclick="saveToFirebase()">💾 Сақтау (онлайн)</button>
</div>

<svg id="tree"></svg>

<div id="childModal" class="modal">
  <div class="modalBox">
    <h3>Бала қосу</h3>
    <div>Ата-ана: <b id="parentDisplay"></b></div>
    <div id="childRows"></div>
    <button onclick="addRow()">+ Бала</button><br><br>
    <button onclick="confirmAddChild()">Қосу</button>
    <button onclick="closeModal()">Жабу</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// 🔹 Firebase конфигін ауыстыр
const firebaseConfig = {
  apiKey: "AIzaSyB9oEdAGpIaPtNZjFvsfIAKVFKOzrIdvE4",
  authDomain: "shezhire-site.firebaseapp.com",
  databaseURL: "https://shezhire-site-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "shezhire-site",
  storageBucket: "shezhire-site.firebasestorage.app",
  messagingSenderId: "714823841418",
  appId: "1:714823841418:web:99333d2aba6d57857b1f73"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 🌳 Дерек
let data = { name:"Алаш", gender:"male", children:[] };
let selected = null;

// 🔹 Firebase-тен оқу
onValue(ref(db,"tree"), snap=>{
  if(snap.val()) data = snap.val();
  update(data);
});

// 🔹 D3 визуализация
const svg = d3.select("#tree");
const g = svg.append("g").attr("transform","translate(50,50)");

const treeLayout = d3.tree().nodeSize([100,180]);

function update(source){
  g.selectAll("*").remove();

  const root = d3.hierarchy(data);
  treeLayout(root);

  // links
  g.selectAll(".link")
    .data(root.links())
    .enter()
    .append("path")
    .attr("class","link")
    .attr("fill","none")
    .attr("stroke","#555")
    .attr("stroke-width",2)
    .attr("d", d3.linkHorizontal()
      .x(d=>d.y)
      .y(d=>d.x)
    );

  // nodes
  const node = g.selectAll(".node")
    .data(root.descendants())
    .enter()
    .append("g")
    .attr("class","node")
    .attr("transform",d=>`translate(${d.y},${d.x})`)
    .on("click",(e,d)=>{
      selected = d;
      toggle(d.data);
      update(data);
    });

  node.append("circle")
    .attr("r",25)
    .attr("fill",d=>{
      if(d.data.gender==="female") return "#f7a6c6"; // қыз
      else return "#8bb7ff"; // ұл
    })
    .attr("stroke",d=>{
      if(d===selected) return "orange"; // таңдалған
      else if(d.data.type==="nephew") return "gold"; // жиен
      else return "#555"; // стандарт
    })
    .attr("stroke-width",d=>{
      if(d===selected || d.data.type==="nephew") return 3;
      else return 2;
    });

  node.append("text")
    .attr("dy",5)
    .attr("text-anchor","middle")
    .text(d=>d.data.name);
}

// 🔹 toggle
function toggle(node){
  if(node.children){
    node._children = node.children;
    node.children = null;
  }else if(node._children){
    node.children = node._children;
    node._children = null;
  }
}

// ➕ Modal
window.addChild = function(){
  if(!selected){ alert("Адам таңда"); return; }
  document.getElementById("parentDisplay").innerText = selected.data.name;
  document.getElementById("childRows").innerHTML = "";
  addRow();
  document.getElementById("childModal").style.display="flex";
}

window.addRow = function(){
  const div = document.createElement("div");
  div.innerHTML = `<input class="name" placeholder="Аты">
                   <select class="gender">
                     <option value="male">Ұл</option>
                     <option value="female">Қыз</option>
                   </select>
                   <select class="type">
                     <option value="child">Бала</option>
                     <option value="nephew">Жиен</option>
                   </select>`;
  document.getElementById("childRows").appendChild(div);
}

window.confirmAddChild = function(){
  const rows = document.querySelectorAll("#childRows div");
  if(!selected.data.children) selected.data.children = [];
  rows.forEach(r=>{
    const name = r.querySelector(".name").value;
    const gender = r.querySelector(".gender").value;
    const type = r.querySelector(".type").value;
    if(name){
      selected.data.children.push({name, gender, type, children:[]});
    }
  });
  closeModal(); update(data);
}

window.closeModal = function(){ document.getElementById("childModal").style.display="none"; }

// ✏️ өзгерту
window.renameNode = function(){
  if(!selected) return;
  const name = prompt("Аты:", selected.data.name);
  if(name) selected.data.name = name;
  const gender = prompt("Жынысы (male/female):", selected.data.gender);
  const type = prompt("Түрі (child/nephew):", selected.data.type || "child");
  if(name) selected.data.name = name;
  selected.data.gender = (gender==="female")?"female":"male";
  selected.data.type = (type==="nephew")?"nephew":"child";
  update(data);
}

// ❌ өшіру
window.deleteNode = function(){
  if(!selected){ alert("Адам таңда"); return; }
  function remove(parent,node){
    if(!parent.children) return;
    parent.children = parent.children.filter(c=>c!==node.data);
    parent.children.forEach(c=>remove(c,node));
  }
  remove(data, selected);
  selected=null; update(data);
}

// 💾 Firebase сақтау
window.saveToFirebase = function(){
  set(ref(db,"tree"), data);
  alert("Онлайн сақталды!");
}

</script>
</body>
</html>
