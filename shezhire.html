<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8" />
<title>Шежіре FINAL PRO</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
body { margin:0; font-family:Arial; background:#f2f2f2; overflow:hidden; }
#toolbar { position:absolute; top:0; left:0; right:0; background:white; padding:10px; display:flex; gap:8px; }
#tree { width:100vw; height:100vh; }

.node rect { fill-opacity:0.35; stroke-width:2; }
.node text { font-size:14px; font-weight:bold; pointer-events:none; }
.link { fill:none; stroke:#999; stroke-width:2; }

#modal {
  position:fixed; top:50%; left:50%;
  transform:translate(-50%,-50%);
  background:white; padding:20px;
  border-radius:10px;
  box-shadow:0 4px 15px rgba(0,0,0,0.3);
  display:none; width:300px;
}
.childItem { background:#eee; margin:5px 0; padding:5px 10px; border-radius:5px; }
</style>
</head>

<body>

<div id="toolbar">
  <button id="addChildBtn">➕ Бала қосу</button>
  <button id="renameBtn">✏️ Өзгерту</button>
  <button id="saveBtn">💾 Сақтау</button>
</div>

<svg id="tree"></svg>

<div id="modal">
  <h3>Бірнеше бала қосу</h3>
  <input id="childName" placeholder="Аты" />
  <select id="gender">
    <option value="male">ер</option>
    <option value="female">әйел</option>
  </select>
  <select id="type">
    <option value="бала">бала</option>
    <option value="жиен">жиен</option>
  </select>

  <br /><br />
  <button id="addMore">+ Қосу</button>
  <button id="confirm">Дайын</button>
  <button id="close">Жабу</button>

  <div id="list"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// ✅ СЕНІҢ FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyB9oEdAGpIaPtNZjFvsfIAKVFKOzrIdvE4",
  authDomain: "shezhire-site.firebaseapp.com",
  databaseURL: "https://shezhire-site-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId: "shezhire-site",
  storageBucket: "shezhire-site.firebasestorage.app",
  messagingSenderId: "714823841418",
  appId: "1:714823841418:web:99333d2aba6d57857b1f73",
  measurementId: "G-8V6NR3MHYC"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let data = null;
let selectedId = null;

let history = [];
let future = [];

function saveHistory() {
  history.push(JSON.stringify(data));
  future = [];
}

function createNode(name, gender, type) {
  return {
    id: Date.now() + Math.random(),
    name,
    gender,
    type,
    children: []
  };
}

const svg = d3.select("#tree");
const g = svg.append("g");

svg.call(d3.zoom().on("zoom", e => g.attr("transform", e.transform)));

onValue(ref(db, "tree"), snap => {
  if (snap.exists()) {
    data = snap.val();
  } else {
    data = createNode("АЛАШ", "male", "бала");
    data.children = [
      createNode("Сейілхан", "male", "бала"),
      createNode("Жайлыхан", "male", "бала")
    ];
    set(ref(db, "tree"), data);
  }
  selectedId = data.id;
  update();
});

function findNode(node, id) {
  if (node.id === id) return node;
  for (let c of (node.children || [])) {
    const res = findNode(c, id);
    if (res) return res;
  }
}

function deleteNode(parent, id) {
  if (!parent.children) return;
  parent.children = parent.children.filter(c => c.id !== id);
  parent.children.forEach(c => deleteNode(c, id));
}

function update() {
  g.selectAll("*").remove();
  if (!data) return;

  const root = d3.hierarchy(data);
  d3.tree().nodeSize([80, 200])(root);

  g.selectAll(".link")
    .data(root.links())
    .enter()
    .append("path")
    .attr("class", "link")
    .attr("d", d => `
      M${d.source.y},${d.source.x}
      C${(d.source.y+d.target.y)/2},${d.source.x}
       ${(d.source.y+d.target.y)/2},${d.target.x}
       ${d.target.y},${d.target.x}
    `);

  const nodes = g.selectAll(".node")
    .data(root.descendants())
    .enter()
    .append("g")
    .attr("transform", d => `translate(${d.y},${d.x})`)
    .on("click", (e,d)=>{ selectedId=d.data.id; update(); });

  nodes.append("rect")
    .attr("x",-60).attr("y",-20)
    .attr("width",120).attr("height",40)
    .attr("rx",20)
    .attr("fill", d => d.data.gender==="female" ? "#f7a6c6" : "#8bb7ff")
    .attr("stroke", d => d.data.id===selectedId ? "red" : "#333")
    .attr("stroke-width",3);

  nodes.append("text")
    .attr("text-anchor","middle")
    .attr("dy",5)
    .text(d=>d.data.name);
}

// --- UI ---
const modal = document.getElementById("modal");
const list = document.getElementById("list");
let tempChildren = [];

addChildBtn.onclick = ()=>{ modal.style.display="block"; tempChildren=[]; list.innerHTML=""; };

addMore.onclick = ()=>{
  const name = childName.value.trim();
  if(!name) return alert("Аты керек");
  tempChildren.push({name, gender:gender.value, type:type.value});
  list.innerHTML += `<div class="childItem">${name}</div>`;
  childName.value="";
};

confirm.onclick = ()=>{
  const parent = findNode(data, selectedId);
  saveHistory();
  tempChildren.forEach(c=> parent.children.push(createNode(c.name,c.gender,c.type)));
  modal.style.display="none";
  autoSave(); update();
};

close.onclick = ()=> modal.style.display="none";

renameBtn.onclick = ()=>{
  const node = findNode(data, selectedId);
  const name = prompt("Жаңа аты:", node.name);
  if(name){ saveHistory(); node.name=name; autoSave(); update(); }
};

// delete
const delBtn = document.createElement("button");
delBtn.textContent="🗑 Өшіру";
toolbar.appendChild(delBtn);

delBtn.onclick = ()=>{
  if(data.id===selectedId) return alert("Root өшірілмейді");
  saveHistory();
  deleteNode(data, selectedId);
  selectedId=data.id;
  autoSave(); update();
};

// undo
const undoBtn = document.createElement("button");
undoBtn.textContent="↩️ Undo";
toolbar.appendChild(undoBtn);

undoBtn.onclick=()=>{
  if(!history.length) return;
  future.push(JSON.stringify(data));
  data=JSON.parse(history.pop());
  autoSave(); update();
};

// redo
const redoBtn = document.createElement("button");
redoBtn.textContent="↪️ Redo";
toolbar.appendChild(redoBtn);

redoBtn.onclick=()=>{
  if(!future.length) return;
  history.push(JSON.stringify(data));
  data=JSON.parse(future.pop());
  autoSave(); update();
};

saveBtn.onclick = ()=>{ set(ref(db,"tree"),data); alert("Сақталды"); };

function autoSave(){ set(ref(db,"tree"),data); }
</script>
</body>
</html>
