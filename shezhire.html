```html
<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<title>Шежіре (Firebase)</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f2f2f2;overflow:hidden;}
#toolbar{position:absolute;top:0;left:0;right:0;background:white;padding:10px;border-bottom:1px solid #ccc;z-index:10;display:flex;gap:8px;}
#tree{width:100vw;height:100vh;}

.node rect{stroke-width:2;fill-opacity:0.3;rx:20;ry:20;cursor:pointer;}
.node text{font-size:14px;font-weight:bold;fill:#222;}
.link{fill:none;stroke:#999;stroke-width:2;}

#addChildModal{
position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
background:white;padding:20px;border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.3);
display:none;width:320px;z-index:100;
}
#childList{margin-top:10px;max-height:120px;overflow:auto;}
.childItem{background:#eee;padding:5px;margin-bottom:5px;border-radius:5px;}
</style>
</head>

<body>

<div id="toolbar">
<button id="btnAddChild">➕ Бала қосу</button>
<button id="btnRename">✏️ Өзгерту</button>
<button id="btnDelete">❌ Өшіру</button>
<button id="btnSave">💾 Сақтау</button>
</div>

<svg id="tree"></svg>

<div id="addChildModal">
<h3>Бала қосу</h3>

<select id="parentSelect"></select>
<input id="childName" placeholder="Аты">
<select id="childGender">
<option value="male">ер</option>
<option value="female">әйел</option>
</select>
<select id="childType">
<option value="бала">бала</option>
<option value="жиен">жиен</option>
</select>

<br><br>
<button id="addOne">Қосу</button>
<button id="addMany">+ Тағы</button>
<button id="closeModal">Жабу</button>

<div id="childList"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app = initializeApp({
  apiKey: "AIzaSy...",
  databaseURL: "https://shezhire-site-default-rtdb.europe-west1.firebasedatabase.app/"
});
const db = getDatabase(app);

let data=null;
let selected=null;

// 🔥 авто root
onValue(ref(db,"tree"), snap=>{
  if(snap.exists()){
    data=snap.val();
  } else {
    data={
      name:"АЛАШ",
      gender:"male",
      type:"бала",
      children:[
        {name:"Сейілхан",gender:"male",type:"бала",children:[]},
        {name:"Жайлыхан",gender:"male",type:"бала",children:[]}
      ]
    };
    set(ref(db,"tree"),data);
  }
  update();
});

function collect(node,list){
  list.push(node);
  if(node.children) node.children.forEach(n=>collect(n,list));
  if(node._children) node._children.forEach(n=>collect(n,list));
}

function find(node,name){
  if(node.name===name) return node;
  let r=null;
  if(node.children) for(let c of node.children){r=find(c,name);if(r)return r;}
  if(node._children) for(let c of node._children){r=find(c,name);if(r)return r;}
  return null;
}

function toggle(d){
  if(d.children){ d._children=d.children; d.children=null; }
  else{ d.children=d._children; d._children=null; }
}

const svg=d3.select("#tree");
const g=svg.append("g");

svg.call(d3.zoom().on("zoom",e=>g.attr("transform",e.transform)));

function update(){
g.selectAll("*").remove();
if(!data) return;

const root=d3.hierarchy(data,d=>d.children);
d3.tree().nodeSize([70,200])(root);

const link=g.selectAll(".link")
.data(root.links())
.enter().append("path")
.attr("class","link")
.attr("d",d=>`M${d.source.y},${d.source.x} L${d.target.y},${d.target.x}`);

const node=g.selectAll(".node")
.data(root.descendants())
.enter().append("g")
.attr("transform",d=>`translate(${d.y},${d.x})`)
.on("click",(e,d)=>{
  selected=d;
  toggle(d.data);
  update();
});

node.append("rect")
.attr("x",-50).attr("y",-20)
.attr("width",100).attr("height",40)
.attr("fill",d=>d.data.gender==="female"?"pink":"lightblue");

node.append("text")
.attr("text-anchor","middle")
.attr("dy",5)
.text(d=>d.data.name);
}

// --- modal ---
const modal=document.getElementById("addChildModal");
const parentSelect=document.getElementById("parentSelect");
const childName=document.getElementById("childName");
const childGender=document.getElementById("childGender");
const childType=document.getElementById("childType");
const childList=document.getElementById("childList");

let temp=[];

document.getElementById("btnAddChild").onclick=()=>{
  if(!selected){ alert("Таңда"); return; }

  modal.style.display="block";
  temp=[]; childList.innerHTML="";

  const nodes=[];
  collect(data,nodes);

  parentSelect.innerHTML="";
  nodes.forEach(n=>{
    let o=document.createElement("option");
    o.value=n.name;
    o.textContent=n.name;
    parentSelect.appendChild(o);
  });

  parentSelect.value=selected.data.name;
};

document.getElementById("addMany").onclick=()=>{
  if(!childName.value) return;

  temp.push({
    name:childName.value,
    gender:childGender.value,
    type:childType.value,
    parent:parentSelect.value
  });

  let div=document.createElement("div");
  div.className="childItem";
  div.textContent=childName.value;
  childList.appendChild(div);

  childName.value="";
};

document.getElementById("addOne").onclick=()=>{
  if(childName.value) document.getElementById("addMany").onclick();

  temp.forEach(c=>{
    let p=find(data,c.parent);
    if(!p.children) p.children=[];
    p.children.push({name:c.name,gender:c.gender,type:c.type,children:[]});
  });

  modal.style.display="none";
  update();
};

document.getElementById("closeModal").onclick=()=>modal.style.display="none";

document.getElementById("btnSave").onclick=()=>{
  set(ref(db,"tree"),data);
  alert("Сақталды");
};

document.getElementById("btnRename").onclick=()=>{
  if(!selected) return;
  let n=prompt("Жаңа аты",selected.data.name);
  if(n) selected.data.name=n;
  update();
};

document.getElementById("btnDelete").onclick=()=>{
  if(!selected) return;
  function remove(p,n){
    if(!p.children) return;
    p.children=p.children.filter(c=>c!==n.data);
    p.children.forEach(c=>remove(c,n));
  }
  remove(data,selected);
  update();
};

</script>
</body>
</html>
