<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8" />
<title>Шежіре PRO</title>

<script src="https://d3js.org/d3.v7.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

<style>
body { margin:0; font-family:Arial; background:#f2f2f2; overflow:hidden;}
#toolbar {position:absolute; top:0; left:0; right:0; background:white; padding:10px; display:flex; gap:8px;}
#tree {width:100vw; height:100vh;}

.node rect {fill-opacity:0.35; stroke-width:2; cursor:pointer;}
.node text {font-size:14px; font-weight:bold; pointer-events:none;}
.link {fill:none; stroke:#999; stroke-width:2;}

#modal {
 position:fixed; top:50%; left:50%;
 transform:translate(-50%,-50%);
 background:white; padding:20px;
 border-radius:10px; display:none;
 width:300px;
}
.childItem {background:#eee; margin:5px; padding:5px; border-radius:4px;}
</style>
</head>

<body>

<div id="toolbar">
  <button id="addChildBtn">➕ Бала қосу</button>
  <button id="renameBtn">✏️ Өзгерту</button>
  <button id="deleteBtn">🗑️ Өшіру</button>
  <button id="saveBtn">☁️ Сақтау</button>
</div>

<svg id="tree"></svg>

<div id="modal">
  <h3>Бала қосу</h3>
  <input id="childName" placeholder="Аты" />
  <select id="gender">
    <option value="male">ер</option>
    <option value="female">әйел</option>
  </select>
  <select id="type">
    <option value="бала">бала</option>
    <option value="жиен">жиен</option>
  </select>
  <br><br>
  <button id="addMore">+ Қосу</button>
  <button id="confirm">Дайын</button>
  <button id="close">Жабу</button>
  <div id="list"></div>
</div>

<script>
// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyB9oEdAGpIaPtNZjFvsfIAKVFKOzrIdvE4",
  authDomain: "shezhire-site.firebaseapp.com",
  projectId: "shezhire-site",
  storageBucket: "shezhire-site.firebasestorage.app",
  appId: "1:714823841418:web:99333d2aba6d57857b1f73"
};

firebase.initializeApp(firebaseConfig);
const storage = firebase.storage();

// DATA
let data = {
  name:"АЛАШ",
  gender:"male",
  type:"бала",
  children:[
    { name:"Сейілхан", gender:"male", type:"бала", children:[] },
    { name:"Жайлыхан", gender:"male", type:"бала", children:[] }
  ]
};

let selected=null;
let tempChildren=[];

const svg = d3.select("#tree");
const g = svg.append("g");
svg.call(d3.zoom().on("zoom", e=>g.attr("transform", e.transform)));

// WIDTH AUTO
function getNodeWidth(node){
  let maxLen=0;
  function t(d){
    if(d.name.length>maxLen) maxLen=d.name.length;
    (d.children||[]).forEach(t);
  }
  t(node);
  return Math.max(120, maxLen*9+40);
}

// UPDATE
function update(){
  g.selectAll("*").remove();

  const nodeWidth=getNodeWidth(data);
  const root=d3.hierarchy(data, d=>d.children);

  d3.tree().nodeSize([80, nodeWidth+80])(root);

  // LINKS (қисық)
  g.selectAll(".link")
    .data(root.links())
    .enter()
    .append("path")
    .attr("class","link")
    .attr("d", d=>{
      const sx=d.source.y+nodeWidth/2;
      const sy=d.source.x;
      const ex=d.target.y-nodeWidth/2;
      const ey=d.target.x;
      const mx=(sx+ex)/2;
      return `M${sx},${sy} C${mx},${sy} ${mx},${ey} ${ex},${ey}`;
    });

  // NODES
  const node=g.selectAll(".node")
    .data(root.descendants())
    .enter()
    .append("g")
    .attr("class","node")
    .attr("transform", d=>`translate(${d.y},${d.x})`)
    .on("click",(e,d)=>{selected=d; update();});

  node.append("rect")
    .attr("x",-nodeWidth/2)
    .attr("y",-20)
    .attr("width",nodeWidth)
    .attr("height",40)
    .attr("rx",20)
    .attr("fill", d=>d.data.gender==="female"?"#f7a6c6":"#8bb7ff")
    .attr("stroke", d=>d.data.type==="жиен"?"gold":"#333")
    .attr("stroke-width", d=>d.data.type==="жиен"?4:2);

  node.append("text")
    .attr("text-anchor","middle")
    .attr("dy",5)
    .text(d=>d.data.name);
}

// MODAL
const modal=document.getElementById("modal");
const list=document.getElementById("list");

document.getElementById("addChildBtn").onclick=()=>{
  if(!selected){alert("Таңда");return;}
  modal.style.display="block";
  tempChildren=[];
  list.innerHTML="";
};

document.getElementById("addMore").onclick=()=>{
  const name=document.getElementById("childName").value;
  const gender=document.getElementById("gender").value;
  const type=document.getElementById("type").value;

  tempChildren.push({name,gender,type});
  const div=document.createElement("div");
  div.className="childItem";
  div.textContent=name;
  list.appendChild(div);
};

document.getElementById("confirm").onclick=()=>{
  tempChildren.forEach(c=>{
    if(!selected.data.children) selected.data.children=[];
    selected.data.children.push({...c, children:[]});
  });
  modal.style.display="none";
  update();
};

document.getElementById("close").onclick=()=>modal.style.display="none";

// SAVE
document.getElementById("saveBtn").onclick=async ()=>{
  const ref=storage.ref("shezhire/main.json");
  await ref.putString(JSON.stringify(data),"raw");
  alert("Сақталды");
};

// LOAD
async function load(){
  try{
    const url=await storage.ref("shezhire/main.json").getDownloadURL();
    const res=await fetch(url);
    data=await res.json();
  }catch(e){}
  update();
}

load();
</script>

</body>
</html>
