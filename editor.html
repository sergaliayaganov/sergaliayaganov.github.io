<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<title>Шежіре</title>

<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f2f2f2;overflow:hidden;}
#toolbar{position:absolute;top:0;left:0;right:0;background:white;padding:8px;border-bottom:1px solid #ccc;}
#tree{width:100vw;height:100vh;}

.node rect{rx:20;ry:20;}
.node text{font-size:14px;pointer-events:none;}
.link{fill:none;stroke:#999;stroke-width:2;}
.selected rect{stroke:orange;stroke-width:3;}
</style>
</head>
<body>

<script>
// 🔐 пароль
const pass = prompt("Пароль:");
if(pass !== "1S963ak1405"){
  document.body.innerHTML = "<h1>Қолжетімсіз</h1>";
  throw new Error("Blocked");
}
</script>

<div id="toolbar">
  <button onclick="addChild()">Бала қосу</button>
  <button onclick="renameNode()">Атын өзгерту</button>
  <button onclick="deleteNode()">Өшіру</button>
  <button onclick="saveToFirebase()">☁️ Сақтау</button>
</div>

<svg id="tree"></svg>

<script type="module">

// 🔥 Firebase
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB9oEdAGpIaPtNZjFvsfIAKVFKOzrIdvE4",
  authDomain: "shezhire-site.firebaseapp.com",
  databaseURL: "https://shezhire-site-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "shezhire-site",
  storageBucket: "shezhire-site.firebasestorage.app",
  messagingSenderId: "714823841418",
  appId: "1:714823841418:web:99333d2aba6d57857b1f73"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 🌳 DATA
let data = { name:"Алаш", children:[] };
let selected = null;

// 📥 Firebase оқу
onValue(ref(db, "tree"), (snapshot)=>{
  const val = snapshot.val();
  if(val) data = val;
  draw();
});

// 🎨 D3
const svg = d3.select("#tree");
const g = svg.append("g");

svg.call(d3.zoom().scaleExtent([0.3,3]).on("zoom",e=>{
  g.attr("transform",e.transform);
}));

const NODE_W = 160, NODE_H = 40;

// 🌳 Салу
function draw(){
  g.selectAll("*").remove();

  const root = d3.hierarchy(data);
  const tree = d3.tree().nodeSize([80, 220]);
  tree(root);

  // 🔗 сызықтар
  g.selectAll(".link")
    .data(root.links())
    .enter()
    .append("path")
    .attr("class","link")
    .attr("d",d=>{
      return `M${d.source.y},${d.source.x}
              C${(d.source.y+d.target.y)/2},${d.source.x}
               ${(d.source.y+d.target.y)/2},${d.target.x}
               ${d.target.y},${d.target.x}`;
    });

  // 🧑 түйіндер
  const node = g.selectAll(".node")
    .data(root.descendants())
    .enter()
    .append("g")
    .attr("class","node")
    .attr("transform",d=>`translate(${d.y},${d.x})`)
    .on("click",(e,d)=>{
      selected = d;
      draw();
    });

  // 🟦 овал
  node.append("rect")
    .attr("x",-NODE_W/2)
    .attr("y",-NODE_H/2)
    .attr("width",NODE_W)
    .attr("height",NODE_H)
    .attr("rx",20)
    .attr("fill","#8bb7ff");

  // ✍️ текст
  node.append("text")
    .attr("text-anchor","middle")
    .attr("dy","0.35em")
    .text(d=>d.data.name);

  // 🔶 таңдау
  node.filter(d=>d===selected)
    .select("rect")
    .attr("stroke","orange")
    .attr("stroke-width",3);
}

// ➕ Бала қосу
window.addChild = function(){
  if(!selected){ alert("Адам таңда"); return; }

  const name = prompt("Бала аты:");
  if(!name) return;

  if(!selected.data.children) selected.data.children = [];
  selected.data.children.push({ name, children:[] });

  draw();
}

// ✏️ Өзгерту
window.renameNode = function(){
  if(!selected) return;

  const name = prompt("Жаңа аты:", selected.data.name);
  if(!name) return;

  selected.data.name = name;
  draw();
}

// ❌ Өшіру
window.deleteNode = function(){
  if(!selected){ alert("Таңда"); return; }

  function remove(parent,node){
    if(!parent.children) return;
    parent.children = parent.children.filter(c=>c!==node.data);
    parent.children.forEach(c=>remove(c,node));
  }

  remove(data, selected);
  selected = null;
  draw();
}

// ☁️ Firebase сақтау
window.saveToFirebase = function(){
  set(ref(db,"tree"), data);
  alert("Сақталды!");
}

</script>

</body>
</html>
