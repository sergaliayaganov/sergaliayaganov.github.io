<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<title>Шежіре редакторы</title>
</head>
<body>

<script>
const pass = prompt("Пароль:");
if(pass !== "1234"){
  document.body.innerHTML="Қолжетімсіз";
}
</script>

<h2>Шежіре редакторы</h2>

<button onclick="add()">Бала қосу</button>
<button onclick="save()">Сақтау (онлайн)</button>

<div id="tree"></div>

<script type="module">

// 🔥 Firebase қосу
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// ⚠️ ОСЫ ЖЕРГЕ ӨЗ CONFIG ҚОЯСЫҢ
const firebaseConfig = {
  apiKey: "AIzaSyB9oEdAGpIaPtNZjFvsfIAKVFKOzrIdvE4",
  authDomain: "shezhire-site.firebaseapp.com",
  databaseURL: "https://shezhire-site-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId: "shezhire-site"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 🌐 Firebase-тан оқу
let data = {name:"АЛАШ", children:[]};

onValue(ref(db, "tree"), (snapshot) => {
  const val = snapshot.val();
  if(val){
    data = val;
    render();
  }
});

let selected=null;

// 🌳 ағаш салу
function create(node){
  const div=document.createElement("div");

  const label=document.createElement("div");
  label.innerText=node.name;
  label.style.background="lightblue";
  label.style.margin="5px";
  label.style.padding="5px";
  label.style.cursor="pointer";

  label.onclick=()=>{
    selected=node;
    alert("Таңдалды: "+node.name);
  };

  div.appendChild(label);

  if(!node.children) node.children=[];

  const ch=document.createElement("div");
  ch.style.marginLeft="20px";

  node.children.forEach(c=>{
    ch.appendChild(create(c));
  });

  div.appendChild(ch);

  return div;
}

// 🌳 экранға шығару
function render(){
  const t=document.getElementById("tree");
  t.innerHTML="";
  t.appendChild(create(data));
}

// ➕ бала қосу
window.add = function(){
  if(!selected) return alert("Таңда!");
  const name=prompt("Аты:");
  if(!name) return;

  selected.children.push({name,children:[]});
  render();
}

// 💾 Firebase-қа сақтау
window.save = function(){
  set(ref(db, "tree"), data);
  alert("Онлайн сақталды!");
}

</script>

</body>
</html>
