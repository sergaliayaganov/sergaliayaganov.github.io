<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<title>Серғали сайты</title>

<style>
body {margin:0;font-family:Arial;}

header{
background:#0a3d62;color:white;padding:15px;text-align:center;
}

.container{display:flex;}

.sidebar{
width:250px;
background:#1e5f8a;
height:100vh;
color:white;
}

.sidebar a{
display:block;
padding:12px;
color:white;
text-decoration:none;
border-bottom:1px solid #ccc;
}

.sidebar a:hover{
background:#0a3d62;
}

.content{
flex:1;
padding:20px;
}

iframe{
width:100%;
height:90vh;
border:none;
}
</style>

</head>

<body>

<header>
<h2>Аяганов Серғали Қазиұлы</h2>
</header>

<div class="container">

<div class="sidebar">
<a href="#" onclick="loadPage('about')">Өзім туралы</a>
<a href="#" onclick="loadPage('physics')">Физика</a>
<a href="#" onclick="loadPage('informatics')">Информатика</a>

<!-- ЖЕКЕ БЕТ БОЛЫП АШЫЛАДЫ -->
<a href="#" onclick="openPage('view')">Шежірені қарау</a>
<a href="#" onclick="openPage('editor')">Шежіре қосу</a>
</div>

<div class="content">
<iframe id="frame"></iframe>
</div>

</div>

<script>
// iframe ішіндегі беттер
function loadPage(page){
let content = "";

if(page === "about"){
content = "<h2>Өзім туралы</h2><p>Бұл мен туралы ақпарат.</p>";
}

if(page === "physics"){
content = "<h2>Физика</h2><p>Физика материалдары.</p>";
}

if(page === "informatics"){
content = "<h2>Информатика</h2><p>Информатика материалдары.</p>";
}

document.getElementById("frame").srcdoc = content;
}

// ЖЕКЕ БЕТТЕР (жаңа бет сияқты)
function openPage(page){

if(page === "view"){
let newWindow = window.open("");
newWindow.document.write(`
<h2>Шежірені қарау</h2>
<a href="view.html" target="_blank">Шежірені қарау</a>

<p>Мұнда шежіре көрсетіледі</p>
<a href="editor.html" target="_blank">Шежіре қосу</a>
`);
}

if(page === "editor"){
let newWindow = window.open("");
newWindow.document.write(`
<h2>Шежіре қосу</h2>
<form>
Аты: <input type="text"><br><br>
Тегі: <input type="text"><br><br>
<button>Сақтау</button>
</form>
`);
}

}
</script>

</body>
</html>
