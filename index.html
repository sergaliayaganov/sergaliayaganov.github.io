<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>Серғали сайты</title>

    <style>
        body { margin: 0; font-family: Arial, sans-serif; }

        header {
            background: #0a3d62;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container { display: flex; }

        .sidebar {
            width: 250px;
            background: #1e5f8a;
            height: 100vh;
            color: white;
        }

        .sidebar a {
            display: block;
            padding: 12px;
            color: white;
            text-decoration: none;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
        }

        .sidebar a:hover {
            background: #0a3d62;
        }

        .content {
            flex: 1;
            padding: 20px;
        }

        iframe {
            width: 100%;
            height: 80vh;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<header>
    <h2>Аяганов Серғали Қазиұлы</h2>
</header>

<div class="container">
    <div class="sidebar">
        <a onclick="loadPage('about')">Өзім туралы</a>
        <a onclick="loadPage('physics')">Физика</a>
        <a onclick="loadPage('informatics')">Информатика</a>
        <hr>
        <a onclick="openPage('view.html')">Шежірені қарау</a>
        <a onclick="openPage('shezhire.html')">Шежіре қосу</a>
    </div>

    <div class="content">
        <iframe id="frame"></iframe>
    </div>
</div>

<script>
    function loadPage(page) {
        let content = "";

        if(page === "about") {
            content = `
                <h2>Өзім туралы</h2>
                <p>Бұл Серғали Қазиұлы туралы ақпараттық бет.</p>
            `;
        }

        if(page === "physics") {
            content = `
                <h2>Физика</h2>
                <p>Физика пәні бойынша оқу материалдары мен тапсырмалар.</p>
            `;
        }

        if(page === "informatics") {
            content = `
                <h2>Информатика</h2>
                <p>Информатика және бағдарламалау негіздері.</p>
            `;
        }

        document.getElementById("frame").srcdoc = content;
    }

    // ЕНДІ нақты HTML файлдарға ашады
    function openPage(url) {
        window.open(url, "_blank");
    }

    window.onload = () => loadPage('about');
</script>

</body>
</html>
