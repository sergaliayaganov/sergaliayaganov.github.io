<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<title>Серғали сайты</title>

<style>
body { margin: 0; font-family: Arial, sans-serif; }

header {
    background: #0a3d62;
    color: white;
    padding: 15px;
    text-align: center;
}

.container { display: flex; }

.sidebar {
    width: 250px;
    background: #1e5f8a;
    height: 100vh;
    color: white;
}

.sidebar a {
    display: block;
    padding: 12px;
    color: white;
    text-decoration: none;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    cursor: pointer;
}

.sidebar a:hover {
    background: #0a3d62;
}

.content {
    flex: 1;
    padding: 20px;
}

iframe {
    width: 100%;
    height: 80vh;
    border: 1px solid #ddd;
    border-radius: 8px;
}
</style>
</head>

<body>

<header>
    <h2>Аяганов Серғали Қазиұлы</h2>
</header>

<div class="container">

    <div class="sidebar">
        <a onclick="loadPage('about')">Өзім туралы</a>
        <a onclick="loadPage('physics')">Физика</a>
        <a onclick="loadPage('informatics')">Информатика</a>

        <hr>

        <a onclick="openPage('shezhire')">Шежіре жасау</a>
        <a onclick="openPage('view')">Шежірені қарау</a>
        <a onclick="openPage('editor')">Шежіре қосу (Құпия сөзбен)</a>
    </div>

    <div class="content">
        <iframe id="frame"></iframe>
    </div>

</div>

<script>
// Ішкі беттер
function loadPage(page) {
    let content = "";

    if(page === "about") {
        content = "<h2>Өзім туралы</h2><p>Бұл Серғали Қазиұлы туралы ақпараттық бет.</p>";
    }

    if(page === "physics") {
        content = "<h2>Физика</h2><p>Физика пәні бойынша оқу материалдары.</p>";
    }

    if(page === "informatics") {
        content = "<h2>Информатика</h2><p>Бағдарламалау негіздері.</p>";
    }

    document.getElementById("frame").srcdoc = content;
}

// ЖАЛҒАН HTML ФАЙЛ ЖАСАУ ФУНКЦИЯСЫ
function openVirtualPage(htmlContent) {
    let blob = new Blob([htmlContent], { type: "text/html" });
    let url = URL.createObjectURL(blob);
    window.open(url, "_blank");
}

// Жеке беттер
function openPage(page) {

    if(page === "shezhire") {
        openVirtualPage(`
            <html>
            <head><title>shezhire.html</title></head>
            <body>
            <h2>Шежіре жасау</h2>
            </body>
            </html>
        `);
    }

    if(page === "view") {
        openVirtualPage(`
            <html>
            <head><title>view.html</title></head>
            <body>
            <h2>Шежірені қарау</h2>
            <p>Бұл view.html беті</p>
            <button onclick="window.close()">Жабу</button>
            </body>
            </html>
        `);
    }

    if(page === "editor") {
        let password = prompt("Құпия сөзді енгізіңіз:");

        if(password === "1S963ak1405") {
            openVirtualPage(`
                <html>
                <head><title>editor.html</title></head>
                <body>
                <h2>Шежіре қосу</h2>

                <form>
                    Аты: <input type="text"><br><br>
                    Тегі: <input type="text"><br><br>
                    <button type="button" onclick="alert('Сақталды!')">
                        Сақтау
                    </button>
                </form>

                <br>
                <button onclick="window.close()">Жабу</button>
                </body>
                </html>
            `);
        } else if(password !== null) {
            alert("Құпия сөз қате!");
        }
    }
}

window.onload = () => loadPage('about');
</script>

</body>
</html>
