<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8" />
<title>Шежірені қарау</title>

<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f2f2f2;
  overflow: hidden;
}

#tree {
  width: 100vw;
  height: 100vh;
}

.node rect {
  fill-opacity: 0.35;
  stroke-width: 2;
}

.node text {
  font-size: 14px;
  font-weight: bold;
  pointer-events: none;
}

.link {
  fill: none;
  stroke: #999;
  stroke-width: 2;
}
</style>
</head>

<body>

<svg id="tree"></svg>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// 🔥 Firebase
const firebaseConfig = {
  apiKey: "AIzaSyB9oEdAGpIaPtNZjFvsfIAKVFKOzrIdvE4",
  authDomain: "shezhire-site.firebaseapp.com",
  databaseURL: "https://shezhire-site-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId: "shezhire-site"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let data = null;

const svg = d3.select("#tree");
const g = svg.append("g");

svg.call(d3.zoom().on("zoom", e => g.attr("transform", e.transform)));

// 📥 Firebase-тан оқу
onValue(ref(db, "tree"), snap => {
  if (snap.exists()) {
    data = snap.val();
  } else {
    data = {
      name: "АЛАШ",
      gender: "male",
      type: "бала",
      children: []
    };
  }
  update();
});

// 🌳 ашу/жабу
function toggle(d) {
  if (d.children) {
    d._children = d.children;
    d.children = null;
  } else if (d._children) {
    d.children = d._children;
    d._children = null;
  }
}

// 🌳 draw
function update() {
  g.selectAll("*").remove();
  if (!data) return;

  const root = d3.hierarchy(data, d => d.children);

  // 🔥 Горизонталь layout
  d3.tree().nodeSize([80, 250])(root);

  const nodeWidth = 120;

  // 🔥 СЫЗЫҚТАР (ортасынан)
  g.selectAll(".link")
    .data(root.links())
    .enter()
    .append("path")
    .attr("class", "link")
    .attr("stroke", d => d.target.data.type === "жиен" ? "gold" : "#999")
    .attr("stroke-width", d => d.target.data.type === "жиен" ? 4 : 2)
    .attr("d", d => {
      const startX = d.source.y + nodeWidth / 2;
      const startY = d.source.x;

      const endX = d.target.y - nodeWidth / 2;
      const endY = d.target.x;

      const midX = (startX + endX) / 2;

      return `
        M${startX},${startY}
        C${midX},${startY}
         ${midX},${endY}
         ${endX},${endY}
      `;
    });

  // 🔥 NODE
  const nodes = g.selectAll(".node")
    .data(root.descendants())
    .enter()
    .append("g")
    .attr("transform", d => `translate(${d.y},${d.x})`)
    .on("click", (event, d) => {
      toggle(d);
      update();
    });

  nodes.append("rect")
    .attr("x", -nodeWidth / 2)
    .attr("y", -20)
    .attr("width", nodeWidth)
    .attr("height", 40)
    .attr("rx", 20)
    .attr("fill", d => d.data.gender === "female" ? "#f7a6c6" : "#8bb7ff")
    .attr("stroke", d => d.data.type === "жиен" ? "gold" : "#3b70d6")
    .attr("stroke-width", d => d.data.type === "жиен" ? 4 : 2);

  nodes.append("text")
    .attr("text-anchor", "middle")
    .attr("dy", 5)
    .text(d => d.data.name);
}

</script>

</body>
</html>
