<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "СЕНІҢ_KEY",
  authDomain: "СЕНІҢ_DOMAIN",
  databaseURL: "СЕНІҢ_DB_URL",
  projectId: "СЕНІҢ_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 🔄 базадағы шежірені оқу
onValue(ref(db, "tree"), (snapshot) => {
  const data = snapshot.val();
  render(data);
});

function render(data){
  document.getElementById("tree").innerHTML="";
  document.getElementById("tree").appendChild(create(data));
}

// 🌳 ағаш функциясы (бұрынғы)
function create(node){
  const div=document.createElement("div");

  const label=document.createElement("div");
  label.className="node";
  label.innerText=node.name;

  div.appendChild(label);

  if(node.children){
    const ch=document.createElement("div");
    ch.className="children";

    node.children.forEach(c=>ch.appendChild(create(c)));

    label.onclick=()=>{
      ch.style.display = ch.style.display==="none"?"block":"none";
    };

    div.appendChild(ch);
  }

  return div;
}

</script>
