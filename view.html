<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">

<style>
.node{
background:#7da7d9;
padding:8px;
margin:5px;
display:inline-block;
cursor:pointer;
border-radius:10px;
}
.children{
margin-left:20px;
display:none;
}
</style>

</head>
<body>

<h2>Шежіре</h2>

<div id="tree"></div>

<script>

let data = JSON.parse(localStorage.getItem("shezhire"));
if(!data){
  data = {name:"АЛАШ", children:[]};
}

function create(node){
  const div=document.createElement("div");

  const label=document.createElement("div");
  label.className="node";
  label.innerText=node.name;

  div.appendChild(label);

  if(node.children){
    const ch=document.createElement("div");
    ch.className="children";

    node.children.forEach(c=>{
      ch.appendChild(create(c));
    });

    label.onclick=()=>{
      ch.style.display =
        ch.style.display==="none"?"block":"none";
    };

    div.appendChild(ch);
  }

  return div;
}

document.getElementById("tree").appendChild(create(data));

</script>

</body>
</html>
