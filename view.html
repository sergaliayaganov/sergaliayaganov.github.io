<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<title>Шежірені қарау</title>

<style>
body{
    font-family: Arial;
}

/* Ағаш контейнер */
.tree ul {
    padding-top: 20px;
    position: relative;
    list-style: none;
    text-align: center;
}

.tree li {
    display: inline-block;
    vertical-align: top;
    text-align: center;
    position: relative;
    padding: 20px 5px 0 5px;
}

/* Сызықтар */
.tree li::before,
.tree li::after {
    content: '';
    position: absolute;
    top: 0;
    border-top: 2px solid #999;
    width: 50%;
    height: 20px;
}

.tree li::before {
    right: 50%;
}

.tree li::after {
    left: 50%;
    border-left: 2px solid #999;
}

/* Бір бала болса */
.tree li:only-child::before,
.tree li:only-child::after {
    display: none;
}

/* Шеттер */
.tree li:first-child::before {
    border: none;
}
.tree li:last-child::after {
    border: none;
}

/* Тік сызық */
.tree ul ul::before {
    content: '';
    position: absolute;
    top: 0;
    left: 50%;
    border-left: 2px solid #999;
    width: 0;
    height: 20px;
}

/* Нод */
.node {
    border: 1px solid #2c5d85;
    padding: 6px 12px;
    border-radius: 8px;
    display: inline-block;
    background: #e3f2fd;
    cursor: pointer;
}

/* Балалар */
.children {
    display: none;
}
</style>

</head>
<body>

<h2>Шежірені қарау</h2>

<div class="tree" id="tree"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "shezhire-site.firebaseapp.com",
  databaseURL: "https://shezhire-site-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId: "shezhire-site"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 🌳 Ағаш құру (UL/LI НҰСҚА!)
function createTree(node){
    const li = document.createElement("li");

    const label = document.createElement("div");
    label.className = "node";
    label.innerText = node.name;

    li.appendChild(label);

    if(node.children && node.children.length > 0){
        const ul = document.createElement("ul");
        ul.className = "children";

        node.children.forEach(child=>{
            ul.appendChild(createTree(child));
        });

        label.onclick = ()=>{
            ul.style.display =
            ul.style.display === "none" ? "block" : "none";
        };

        li.appendChild(ul);
    }

    return li;
}

// 🌳 Рендер
function render(data){
    const tree = document.getElementById("tree");
    tree.innerHTML = "";

    const ul = document.createElement("ul");
    ul.appendChild(createTree(data));

    tree.appendChild(ul);
}

// 🔄 Firebase
onValue(ref(db, "tree"), (snapshot) => {
    const data = snapshot.val();

    if(data){
        render(data);
    } else {
        render({ name: "АЛАШ", children: [] });
    }
});

</script>

</body>
</html>
